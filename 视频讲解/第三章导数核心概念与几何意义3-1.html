<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频3.1 导数的核心概念与几何意义</title>
    <link rel="stylesheet" href="./noto-serif-sc.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Noto Serif SC', 'Source Han Serif SC', 'Songti SC', 'SimSun', serif;
            background: radial-gradient(circle at top, #141b3a, #050714 55%);
            color: #f4f7ff;
            overflow: hidden;
        }

        .blackboard {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: stretch;
            padding: 36px 48px;
            background-image:
                linear-gradient(135deg, rgba(23, 32, 64, 0.75), rgba(5, 8, 20, 0.95)),
                radial-gradient(circle at top, rgba(58, 82, 173, 0.35), transparent 55%);
        }

        .avatar-container {
            position: fixed;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 720px;
            height: 820px;
            pointer-events: none;
            z-index: 30;
        }

        .avatar-container .wrapper {
            width: 100%;
            height: 100%;
            background: transparent;
        }

        .content-area {
            position: relative;
            width: 100%;
            max-width: 1400px;
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: 18px;
            z-index: 10;
        }

        .lesson-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 24px;
            border-radius: 16px;
            background: rgba(12, 18, 40, 0.82);
            border: 1px solid rgba(72, 198, 239, 0.28);
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.45);
        }

        .lesson-header h1 {
            font-size: 1.5rem;
            letter-spacing: 0.08em;
        }

        .lesson-header p {
            margin-top: 4px;
            font-size: 0.95rem;
            color: rgba(203, 213, 255, 0.75);
        }

        .status-indicator {
            font-size: 0.9rem;
            padding: 6px 18px;
            border-radius: 999px;
            background: linear-gradient(135deg, rgba(72, 198, 239, 0.2), rgba(127, 127, 255, 0.2));
            border: 1px solid rgba(72, 198, 239, 0.45);
            color: #7fb7ff;
        }

        .workspace {
            flex: 1;
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 20px;
        }

        .board-panel {
            background: rgba(12, 18, 40, 0.82);
            border-radius: 20px;
            border: 1px solid rgba(72, 198, 239, 0.22);
            padding: 26px 24px 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.45);
        }

        .board-panel h2 {
            font-size: 1.25rem;
            color: #6ec8ff;
            letter-spacing: 0.08em;
        }

        .board-note {
            color: rgba(203, 213, 255, 0.85);
            font-size: 0.95rem;
            line-height: 1.8;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .board-note p {
            text-indent: -0.8em;
            padding-left: 0.8em;
        }

        .board-formula {
            margin-top: auto;
            border-radius: 14px;
            border: 1px solid rgba(72, 198, 239, 0.35);
            background: rgba(72, 198, 239, 0.12);
            padding: 18px 20px;
            color: #6ec8ff;
            font-size: 1rem;
            line-height: 1.6;
            min-height: 88px;
        }

        .slides-shell {
            position: relative;
            background: rgba(12, 18, 40, 0.82);
            border-radius: 26px;
            border: 1px solid rgba(72, 198, 239, 0.24);
            box-shadow: 0 20px 55px rgba(0, 0, 0, 0.46);
            overflow: hidden;
            display: flex;
            align-items: stretch;
            justify-content: center;
        }

        .slides-stack {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .slide {
            position: absolute;
            inset: 0;
            padding: 26px 26px 30px;
            opacity: 0;
            transform: translateY(22px) scale(0.98);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .slide.active {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .slide .slide-title {
            font-size: 1.2rem;
            color: #f4f7ff;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        .slide .visual-plane {
            position: relative;
            border-radius: 20px;
            background: rgba(6, 10, 26, 0.95);
            border: 1px solid rgba(72, 198, 239, 0.28);
            height: calc(100% - 24px);
            overflow: hidden;
        }

        .control-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 24px;
            border-radius: 16px;
            background: rgba(12, 18, 40, 0.82);
            border: 1px solid rgba(72, 198, 239, 0.24);
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.45);
        }

        .controls-left {
            display: flex;
            gap: 12px;
        }

        button {
            border: none;
            background: rgba(72, 198, 239, 0.18);
            color: #f4f7ff;
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 0.95rem;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        button:hover:not(:disabled) {
            background: rgba(72, 198, 239, 0.3);
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .slide-indicator {
            font-size: 0.9rem;
            color: rgba(203, 213, 255, 0.72);
            letter-spacing: 0.12em;
        }

        .subtitle-area {
            padding: 18px 24px;
            border-radius: 16px;
            border: 1px solid rgba(72, 198, 239, 0.18);
            background: rgba(12, 18, 40, 0.78);
            color: rgba(203, 213, 255, 0.85);
            line-height: 1.7;
            font-size: 0.95rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            text-align: center;
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(203, 213, 255, 0.85);
        }

        tr.visible {
            animation: rowReveal 0.6s ease forwards;
        }

        @keyframes rowReveal {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .speedometer {
            position: absolute;
            right: 24px;
            top: 50%;
            transform: translateY(-50%);
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 45%, rgba(72, 198, 239, 0.28), rgba(10, 15, 34, 0.92));
            border: 1px solid rgba(72, 198, 239, 0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 36px rgba(0, 0, 0, 0.45);
        }

        .speedometer .needle {
            width: 6px;
            height: 85px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(72, 198, 239, 0.7));
            transform-origin: 50% 80%;
            border-radius: 6px;
            position: absolute;
            bottom: 42px;
            transition: transform 0.08s ease-out;
        }

        .speedometer .center {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #48c6ef;
            box-shadow: 0 0 12px rgba(72, 198, 239, 0.6);
        }

        .speed-value {
            position: absolute;
            bottom: 26px;
            font-size: 1.1rem;
            color: #f4f7ff;
        }

        .compare-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: 100%;
        }

        .compare-panel {
            position: relative;
            padding: 20px;
            border-right: 1px solid rgba(255, 255, 255, 0.08);
        }

        .compare-panel:last-child {
            border-right: none;
        }

        .compare-title {
            font-size: 1rem;
            letter-spacing: 0.08em;
            color: #6ec8ff;
            margin-bottom: 12px;
        }

        .warning-label {
            position: absolute;
            top: 18px;
            right: 18px;
            padding: 8px 12px;
            border-radius: 8px;
            background: rgba(255, 99, 132, 0.16);
            border: 1px solid rgba(255, 99, 132, 0.55);
            color: #ff7f96;
            font-size: 0.85rem;
            letter-spacing: 0.08em;
            animation: pulse 1.2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.72; }
            50% { transform: scale(1.06); opacity: 1; }
        }

        .cusp-highlight {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 18px;
            border-radius: 999px;
            background: rgba(255, 99, 132, 0.18);
            border: 1px solid rgba(255, 99, 132, 0.55);
            color: #ff7f96;
            letter-spacing: 0.08em;
            transition: opacity 0.6s ease;
        }

        .question-card {
            position: absolute;
            bottom: 22px;
            right: 22px;
            padding: 18px 24px;
            border-radius: 14px;
            background: rgba(18, 24, 48, 0.92);
            border: 1px solid rgba(72, 198, 239, 0.45);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.45);
            max-width: 340px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease;
        }

        .question-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .question-card h3 {
            font-size: 1rem;
            color: #6ec8ff;
            margin-bottom: 10px;
            letter-spacing: 0.08em;
        }

        .delta-label {
            position: absolute;
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 6px;
            background: rgba(72, 198, 239, 0.16);
            border: 1px solid rgba(72, 198, 239, 0.35);
            color: #48c6ef;
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <div class="blackboard">
        <div class="avatar-container">
            <div class="wrapper" id="avatarMount"></div>
        </div>
        <div class="content-area">
            <header class="lesson-header">
                <div>
                    <h1>视频3.1 导数的核心概念与几何意义</h1>
                    <p>参考附录A六页蓝图 · 物理引入 → 极限定义 → 几何意义 → 数值验证 → 物理应用 → 易错提醒</p>
                </div>
                <div class="status-indicator" id="statusIndicator">系统就绪</div>
            </header>
            <div class="workspace">
                <div class="board-panel">
                    <h2 id="boardTitle">导数引入：为何需要瞬时速度？</h2>
                    <div class="board-note" id="boardContent"></div>
                    <div class="board-formula" id="boardFormula"></div>
                </div>
                <div class="slides-shell">
                    <div class="slides-stack" id="slidesContainer"></div>
                </div>
            </div>
            <footer class="control-panel">
                <div class="controls-left">
                    <button id="prevBtn">上一页</button>
                    <button id="nextBtn">下一页</button>
                    <button id="playBtn">自动播放</button>
                </div>
                <div class="slide-indicator" id="slideIndicator">第 1 / 6 页</div>
            </footer>
            <div class="subtitle-area" id="subtitleArea">准备讲解...</div>
        </div>
    </div>

    <script src="./mathjax-tex-mml-chtml.js"></script>
    <script>
    const courseData = {
        totalSlides: 6,
        slides: [
            {
                id: 'slide-1',
                title: '瞬时变化率的直观需求',
                blackboard: {
                    title: '导数引入：为何需要瞬时速度？',
                    content: `
                        <p>· 观察一辆赛车沿弯道行驶的全过程，位移 <em>s</em>(t) 呈非线性变化。</p>
                        <p>· 平均速度 = <span class="mathjax">\(\dfrac{\Delta s}{\Delta t}\)</span> 只能描述一个区间内的整体变化。</p>
                        <p>· 关键问题：<strong>在某一瞬间</strong>，车辆的速度如何刻画？</p>
                    `,
                    formula: '\\(s(t)=12t^2+4t+6\\sin(1.6t)\\)'
                },
                script: '赛车行驶呈现复杂的位移变化曲线，我们关心的是在某一个具体时刻的瞬时速度，这就是导数概念诞生的背景。',
                animation: {
                    type: 'PhysicsIntroAnimation',
                    config: {
                        duration: 12000,
                        pathPoints: [
                            { x: 0.1, y: 0.8 },
                            { x: 0.2, y: 0.6 },
                            { x: 0.35, y: 0.5 },
                            { x: 0.45, y: 0.35 },
                            { x: 0.6, y: 0.3 },
                            { x: 0.75, y: 0.42 },
                            { x: 0.88, y: 0.25 }
                        ],
                        displacementFunction: function(t) {
                            return 12 * t * t + 4 * t + 6 * Math.sin(1.6 * t);
                        }
                    }
                }
            },
            {
                id: 'slide-2',
                title: '割线斜率的极限想法',
                blackboard: {
                    title: '极限定义：先有割线，再谈切线',
                    content: `
                        <p>· 选择曲线 <span class="mathjax">\(y=x^2\)</span>，固定点 <span class="mathjax">P(1,1)</span>。</p>
                        <p>· 让点 <span class="mathjax">Q(1+\Delta x,(1+\Delta x)^2)</span> 在曲线上移动。</p>
                        <p>· 割线斜率：<span class="mathjax">\(m_{PQ}=\dfrac{\Delta y}{\Delta x}=\dfrac{(1+\Delta x)^2-1}{\Delta x}\)</span></p>
                    `,
                    formula: '\\(m_{PQ}=\dfrac{(1+\Delta x)^2-1}{\Delta x}\\)'
                },
                script: '通过观察割线的变化，我们可以用数值的方式追踪斜率。随着点Q沿曲线移动，割线的斜率实时更新，为极限思想埋下伏笔。',
                animation: {
                    type: 'DerivativeAnimation',
                    config: {
                        mode: 'secant',
                        initialDx: 2,
                        minDx: 0.4,
                        duration: 9000
                    }
                }
            },
            {
                id: 'slide-3',
                title: '极限过程与切线诞生',
                blackboard: {
                    title: '从割线到切线：导数的几何意义',
                    content: `
                        <p>· 让 <span class="mathjax">\(\Delta x\)</span> 从 2 平滑减小至 0.01，割线逐步转化为切线。</p>
                        <p>· 实时监测 <span class="mathjax">\(m_{PQ}\)</span> 的变化，并最终得到 <span class="mathjax">\(f'(1)=2\)</span>。</p>
                        <p>· 切线呈现为极限意义下的唯一方向。</p>
                    `,
                    formula: "\\(\lim_{\Delta x\to 0}\dfrac{\Delta y}{\Delta x}=f'(1)=2\\)"
                },
                script: '随着点Q逐渐逼近P，割线最终与曲线只在一点相切，切线斜率稳定在二，完整呈现导数的几何诠释。',
                animation: {
                    type: 'DerivativeAnimation',
                    config: {
                        mode: 'tangent',
                        initialDx: 2,
                        minDx: 0.01,
                        duration: 9000
                    }
                }
            },
            {
                id: 'slide-4',
                title: '数值近似验证导数',
                blackboard: {
                    title: '用数据接近导数值',
                    content: `
                        <p>· 通过逐步缩小 <span class="mathjax">\(\Delta x\)</span>，计算割线斜率。</p>
                        <p>· 观察斜率如何逼近真实导数 <span class="mathjax">2</span>。</p>
                        <p>· 同时记录误差 <span class="mathjax">|m_{PQ}-2|</span>。</p>
                    `,
                    formula: '\\(\begin{array}{c|c|c}\\Delta x & m_{PQ} & |m_{PQ}-2|\\\\\\end{array}\\)'
                },
                script: '表格中的数据一行行呈现，展示割线斜率如何快速逼近真实导数值二，数值观察与几何直觉完美契合。',
                animation: {
                    type: 'TableAnimation',
                    config: {
                        rows: [
                            { dx: 0.5, slope: ((1.5 * 1.5 - 1) / 0.5).toFixed(3) },
                            { dx: 0.1, slope: ((1.1 * 1.1 - 1) / 0.1).toFixed(4) },
                            { dx: 0.05, slope: ((1.05 * 1.05 - 1) / 0.05).toFixed(4) },
                            { dx: 0.01, slope: ((1.01 * 1.01 - 1) / 0.01).toFixed(5) },
                            { dx: 0.005, slope: ((1.005 * 1.005 - 1) / 0.005).toFixed(5) }
                        ],
                        trueDerivative: 2
                    }
                }
            },
            {
                id: 'slide-5',
                title: '瞬时速度的物理诠释',
                blackboard: {
                    title: '切线斜率 = 瞬时速度',
                    content: `
                        <p>· 位移函数 <span class="mathjax">s(t)=6t+1.75t^2</span>。</p>
                        <p>· 瞬时速度 <span class="mathjax">v(t)=s'(t)=6+3.5t</span>。</p>
                        <p>· 将切线斜率映射到速度计，直观呈现速度变化。</p>
                    `,
                    formula: "\\(v(t)=s'(t)=6+3.5t\\)"
                },
                script: '当指示点沿着位移曲线运动，实时计算的切线斜率驱动速度计指针。瞬时速度的物理意义被直接可视化出来。',
                animation: {
                    type: 'SpeedometerAnimation',
                    config: {
                        displacement: function(t) { return 6 * t + 1.75 * t * t; },
                        velocity: function(t) { return 6 + 3.5 * t; },
                        domain: [0, 6],
                        duration: 10000
                    }
                }
            },
            {
                id: 'slide-6',
                title: '总结与易错警示',
                blackboard: {
                    title: '正确理解导数，警惕不可导情形',
                    content: `
                        <p>· 切线斜率代表瞬时变化率，区别于平均变化率。</p>
                        <p>· 平滑曲线上导数存在，而尖点、拐角处导数可能不存在。</p>
                        <p>· 以 <span class="mathjax">|x|</span> 在 <span class="mathjax">x=0</span> 处为例，左右斜率不一致，不可导。</p>
                    `,
                    formula: '\\(\\text{导数存在} \\Rightarrow \\text{左右极限一致}\\)'
                },
                script: '牢记导数描述的是瞬时变化率：正确的切线应依附于一点，而平均变化率只是割线。面对尖点函数如绝对值，导数无法定义。',
                animation: {
                    type: 'ComparisonAnimation',
                    config: {}
                }
            }
        ]
    };

    class SlideManager {
        constructor(data) {
            this.data = data;
            this.current = 0;
            this.animationControllers = new Map();
            this.activeController = null;
            this.isPlaying = false;
            this.init();
        }

        init() {
            this.container = document.getElementById('slidesContainer');
            this.boardTitle = document.getElementById('boardTitle');
            this.boardContent = document.getElementById('boardContent');
            this.boardFormula = document.getElementById('boardFormula');
            this.subtitleArea = document.getElementById('subtitleArea');
            this.statusIndicator = document.getElementById('statusIndicator');
            this.buildSlides();
            this.bindControls();
            this.showSlide(0, true);
        }

        buildSlides() {
            this.data.slides.forEach((slide, index) => {
                const slideEl = document.createElement('div');
                slideEl.className = 'slide';
                slideEl.dataset.index = index;
                slideEl.innerHTML = `
                    <div class="slide-title">${slide.title}</div>
                    <div class="visual-plane" id="anim-${slide.id}"></div>
                `;
                this.container.appendChild(slideEl);
                const controller = AnimationFactory.create(slide.animation.type, slide.animation.config, `anim-${slide.id}`);
                this.animationControllers.set(index, controller);
            });
        }

        bindControls() {
            document.getElementById('prevBtn').addEventListener('click', () => this.showSlide(this.current - 1));
            document.getElementById('nextBtn').addEventListener('click', () => this.showSlide(this.current + 1));
            document.getElementById('playBtn').addEventListener('click', () => this.autoPlay());
        }

        async autoPlay() {
            if (this.isPlaying) return;
            this.isPlaying = true;
            const playBtn = document.getElementById('playBtn');
            playBtn.disabled = true;
            let finished = false;
            try {
                for (let i = 0; i < this.data.slides.length; i++) {
                    this.showSlide(i);
                    this.statusIndicator.textContent = `第 ${i + 1}/${this.data.totalSlides} 页动画播放中...`;
                    const controller = this.animationControllers.get(i);
                    await controller.playScripted(this.data.slides[i].script);
                }
                this.statusIndicator.textContent = '自动播放结束';
                finished = true;
            } finally {
                this.isPlaying = false;
                playBtn.disabled = false;
                this.updateControls();
                if (!finished) {
                    this.statusIndicator.textContent = '自动播放终止';
                }
            }
        }

        showSlide(index, immediate = false) {
            if (index < 0 || index >= this.data.totalSlides) return;
            if (!immediate && index === this.current) return;

            const previousSlide = this.container.querySelector('.slide.active');
            if (previousSlide) {
                previousSlide.classList.remove('active');
            }

            const targetSlide = this.container.querySelector(`.slide[data-index="${index}"]`);
            if (targetSlide) {
                targetSlide.classList.add('active');
            }

            this.current = index;
            this.updateBoard(this.data.slides[index]);
            this.updateControls();
            this.switchAnimation(index);
            if (!this.isPlaying) {
                this.statusIndicator.textContent = `第 ${index + 1}/${this.data.totalSlides} 页就绪`;
            }
        }

        updateBoard(slide) {
            this.boardTitle.innerHTML = slide.blackboard.title;
            this.boardContent.innerHTML = slide.blackboard.content;
            this.boardFormula.innerHTML = slide.blackboard.formula;
            this.subtitleArea.textContent = slide.script;
            MathJax.typesetPromise();
        }

        updateControls() {
            document.getElementById('slideIndicator').textContent = `第 ${this.current + 1} / ${this.data.totalSlides} 页`;
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            if (this.isPlaying) {
                prevBtn.disabled = true;
                nextBtn.disabled = true;
            } else {
                prevBtn.disabled = this.current === 0;
                nextBtn.disabled = this.current === this.data.totalSlides - 1;
            }
        }

        switchAnimation(index) {
            if (this.activeController) {
                this.activeController.stop();
            }
            const controller = this.animationControllers.get(index);
            this.activeController = controller;
            controller.start();
        }
    }

    class AnimationFactory {
        static create(type, config, containerId) {
            switch (type) {
                case 'PhysicsIntroAnimation':
                    return new PhysicsIntroAnimation(containerId, config);
                case 'DerivativeAnimation':
                    return new DerivativeAnimation(containerId, config);
                case 'TableAnimation':
                    return new TableAnimation(containerId, config);
                case 'SpeedometerAnimation':
                    return new SpeedometerAnimation(containerId, config);
                case 'ComparisonAnimation':
                    return new ComparisonAnimation(containerId, config);
                default:
                    throw new Error(`未知动画类型: ${type}`);
            }
        }
    }

    class BaseAnimation {
        constructor(containerId) {
            this.container = document.getElementById(containerId);
            this.isPlaying = false;
            this.lastTimestamp = 0;
        }

        start() {
            this.isPlaying = true;
            this.lastTimestamp = 0;
        }

        stop() {
            this.isPlaying = false;
        }

        playScripted(scriptText = '') {
            return new Promise(resolve => {
                this.start();
                const baseDuration = this.getDuration ? this.getDuration() : 8000;
                const estimatedSpeech = Math.max(scriptText.length * 120, 4000);
                const duration = Math.max(baseDuration, estimatedSpeech);
                setTimeout(() => {
                    this.stop();
                    resolve();
                }, duration);
            });
        }
    }

    class PhysicsIntroAnimation extends BaseAnimation {
        constructor(containerId, config) {
            super(containerId);
            this.config = config;
            this.canvas = document.createElement('canvas');
            this.questionCard = document.createElement('div');
            this.questionCard.className = 'question-card';
            this.questionCard.innerHTML = `
                <h3>核心问题</h3>
                <p>当时间来到 <span class="mathjax">\(t=t_0\)</span> 的瞬间，应该如何计算车辆的瞬时速度？</p>
            `;
            this.container.appendChild(this.canvas);
            this.container.appendChild(this.questionCard);
            this.ctx = this.canvas.getContext('2d');
            this.duration = config.duration || 12000;
            this.resizeObserver = new ResizeObserver(() => this.onResize());
            this.resizeObserver.observe(this.container);
            this.onResize();
        }

        getDuration() {
            return this.duration + 1000;
        }

        onResize() {
            const { clientWidth, clientHeight } = this.container;
            this.canvas.width = clientWidth;
            this.canvas.height = clientHeight;
        }

        catmullRomSpline(points, t) {
            const n = points.length;
            const p = (n - 1) * t;
            const i = Math.floor(p);
            const w = p - i;
            const p0 = points[Math.max(0, i - 1)];
            const p1 = points[i];
            const p2 = points[Math.min(n - 1, i + 1)];
            const p3 = points[Math.min(n - 1, i + 2)];

            const q0 = -0.5 * w * w * w + w * w - 0.5 * w;
            const q1 = 1.5 * w * w * w - 2.5 * w * w + 1;
            const q2 = -1.5 * w * w * w + 2 * w * w + 0.5 * w;
            const q3 = 0.5 * w * w * w - 0.5 * w * w;

            return {
                x: this.canvas.width * (q0 * p0.x + q1 * p1.x + q2 * p2.x + q3 * p3.x),
                y: this.canvas.height * (q0 * p0.y + q1 * p1.y + q2 * p2.y + q3 * p3.y)
            };
        }

        drawFrame(progress) {
            const ctx = this.ctx;
            const { width, height } = this.canvas;
            ctx.clearRect(0, 0, width, height);

            ctx.strokeStyle = 'rgba(75, 154, 255, 0.35)';
            ctx.lineWidth = 2;
            ctx.setLineDash([6, 8]);
            ctx.strokeRect(24, 24, width * 0.45 - 48, height - 48);
            ctx.setLineDash([]);

            ctx.save();
            ctx.beginPath();
            const steps = 200;
            for (let i = 0; i <= steps; i++) {
                const { x, y } = this.catmullRomSpline(this.config.pathPoints, i / steps);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.strokeStyle = 'rgba(72,198,239,0.6)';
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.restore();

            const carT = Math.min(progress, 0.98);
            const carPos = this.catmullRomSpline(this.config.pathPoints, carT);
            const aheadPos = this.catmullRomSpline(this.config.pathPoints, Math.min(carT + 0.01, 0.99));
            const angle = Math.atan2(aheadPos.y - carPos.y, aheadPos.x - carPos.x);

            ctx.save();
            ctx.translate(carPos.x, carPos.y);
            ctx.rotate(angle);
            ctx.fillStyle = '#ffcf5b';
            ctx.shadowBlur = 20;
            ctx.shadowColor = 'rgba(255,207,91,0.45)';
            ctx.fillRect(-22, -12, 44, 24);
            ctx.fillStyle = '#1a213f';
            ctx.fillRect(-14, -10, 28, 20);
            ctx.restore();

            const graphX = width * 0.5;
            const graphWidth = width * 0.45;
            const graphHeight = height - 48;

            ctx.save();
            ctx.translate(graphX, 24);
            ctx.strokeStyle = 'rgba(255,255,255,0.12)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 6; i++) {
                const x = (graphWidth / 6) * i;
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, graphHeight);
                ctx.stroke();
            }
            for (let i = 0; i <= 6; i++) {
                const y = (graphHeight / 6) * i;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(graphWidth, y);
                ctx.stroke();
            }

            const sampleCount = 240;
            ctx.beginPath();
            for (let i = 0; i <= sampleCount; i++) {
                const t = (i / sampleCount) * 6;
                const s = this.config.displacementFunction(t);
                const x = (i / sampleCount) * graphWidth;
                const sNorm = (s - 0) / 320;
                const y = graphHeight - sNorm * graphHeight;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.strokeStyle = 'rgba(127, 127, 255, 0.9)';
            ctx.lineWidth = 3;
            ctx.stroke();

            const currentT = carT * 6;
            const currentS = this.config.displacementFunction(currentT);
            const dotX = carT * graphWidth;
            const dotY = graphHeight - (currentS / 320) * graphHeight;
            ctx.fillStyle = '#ffcf5b';
            ctx.beginPath();
            ctx.arc(dotX, dotY, 7, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();

            ctx.fillStyle = 'rgba(255,255,255,0.65)';
            ctx.font = '16px "Noto Serif SC"';
            ctx.fillText('位移-时间图像 s(t)', graphX + 10, 40);
            ctx.fillText('赛道运动示意', 36, 40);
        }

        animate(timestamp) {
            if (!this.isPlaying) return;
            if (!this.startTime) this.startTime = timestamp;
            const elapsed = timestamp - this.startTime;
            const progress = Math.min(elapsed / this.duration, 1);
            this.drawFrame(progress);
            if (elapsed < this.duration) {
                this.animationFrame = requestAnimationFrame(this.animate.bind(this));
            } else {
                this.questionCard.classList.add('visible');
                MathJax.typesetPromise();
            }
        }

        start() {
            super.start();
            this.onResize();
            this.questionCard.classList.remove('visible');
            this.startTime = null;
            cancelAnimationFrame(this.animationFrame);
            this.animationFrame = requestAnimationFrame(this.animate.bind(this));
        }

        stop() {
            super.stop();
            cancelAnimationFrame(this.animationFrame);
            this.questionCard.classList.remove('visible');
        }
    }

    class DerivativeAnimation extends BaseAnimation {
        constructor(containerId, config) {
            super(containerId);
            this.config = config;
            this.canvas = document.createElement('canvas');
            this.container.appendChild(this.canvas);
            this.ctx = this.canvas.getContext('2d');
            this.duration = config.duration || 9000;
            this.resizeObserver = new ResizeObserver(() => this.onResize());
            this.resizeObserver.observe(this.container);
            this.onResize();
        }

        getDuration() {
            return this.duration + 500;
        }

        onResize() {
            const { clientWidth, clientHeight } = this.container;
            this.canvas.width = clientWidth;
            this.canvas.height = clientHeight;
            this.drawFrame(0);
        }

        drawAxes() {
            const ctx = this.ctx;
            const { width, height } = this.canvas;
            ctx.strokeStyle = 'rgba(255,255,255,0.12)';
            ctx.lineWidth = 1.2;
            ctx.beginPath();
            ctx.moveTo(60, height - 60);
            ctx.lineTo(width - 30, height - 60);
            ctx.moveTo(60, height - 60);
            ctx.lineTo(60, 40);
            ctx.stroke();
        }

        computePoints() {
            const points = [];
            const { width, height } = this.canvas;
            for (let x = -2; x <= 3; x += 0.02) {
                points.push({
                    x: 60 + ((x + 2) / 5) * (width - 110),
                    y: (height - 60) - (x * x) * ((height - 120) / 9)
                });
            }
            return points;
        }

        drawCurve() {
            const ctx = this.ctx;
            const points = this.computePoints();
            ctx.beginPath();
            points.forEach((pt, i) => {
                if (i === 0) ctx.moveTo(pt.x, pt.y);
                else ctx.lineTo(pt.x, pt.y);
            });
            ctx.strokeStyle = 'rgba(127,127,255,0.88)';
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        drawSecant(dx) {
            const ctx = this.ctx;
            const baseX = 60 + ((1 + 2) / 5) * (this.canvas.width - 110);
            const baseY = (this.canvas.height - 60) - (1 * 1) * ((this.canvas.height - 120) / 9);
            const qx = 60 + ((1 + dx + 2) / 5) * (this.canvas.width - 110);
            const qyVal = (1 + dx) * (1 + dx);
            const qy = (this.canvas.height - 60) - (qyVal) * ((this.canvas.height - 120) / 9);

            ctx.strokeStyle = 'rgba(72,198,239,0.8)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(baseX, baseY);
            ctx.lineTo(qx, qy);
            ctx.stroke();

            ctx.fillStyle = '#ffcf5b';
            ctx.beginPath();
            ctx.arc(baseX, baseY, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(qx, qy, 6, 0, Math.PI * 2);
            ctx.fill();

            const slope = ((qyVal - 1) / dx).toFixed(3);
            ctx.fillStyle = 'rgba(255,255,255,0.85)';
            ctx.font = '16px "Noto Serif SC"';
            ctx.fillText(`m = ${slope}`, baseX + 20, baseY - 16);

            ctx.fillStyle = 'rgba(72,198,239,0.75)';
            ctx.fillRect(qx - 6, this.canvas.height - 60, 2, 40);
            ctx.fillRect(60 - 40, qy - 6, 40, 2);
            ctx.fillStyle = 'rgba(203,213,255,0.85)';
            ctx.font = '14px "Noto Serif SC"';
            ctx.fillText('Δx', (baseX + qx) / 2 - 10, this.canvas.height - 30);
            ctx.fillText('Δy', 30, (baseY + qy) / 2);
        }

        drawTangent() {
            const ctx = this.ctx;
            const baseX = 60 + ((1 + 2) / 5) * (this.canvas.width - 110);
            const baseY = (this.canvas.height - 60) - (1 * 1) * ((this.canvas.height - 120) / 9);
            const tangentLength = 160;

            ctx.strokeStyle = 'rgba(255, 154, 118, 0.9)';
            ctx.lineWidth = 3.2;
            ctx.beginPath();
            ctx.moveTo(baseX - tangentLength, baseY - tangentLength * 2);
            ctx.lineTo(baseX + tangentLength, baseY + tangentLength * 2);
            ctx.stroke();

            ctx.fillStyle = 'rgba(255,255,255,0.9)';
            ctx.font = '16px "Noto Serif SC"';
            ctx.fillText("f'(1) = 2", baseX + 18, baseY - 18);
        }

        drawFrame(progress) {
            const ctx = this.ctx;
            ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            this.drawAxes();
            this.drawCurve();

            const dx = this.config.mode === 'secant'
                ? this.config.initialDx - (this.config.initialDx - this.config.minDx) * progress
                : Math.max(this.config.minDx, this.config.initialDx * Math.pow(0.06, progress));

            this.drawSecant(dx);

            if (this.config.mode === 'tangent' && progress > 0.85) {
                this.drawTangent();
            }
        }

        animate(timestamp) {
            if (!this.isPlaying) return;
            if (!this.startTime) this.startTime = timestamp;
            const elapsed = timestamp - this.startTime;
            const progress = Math.min(elapsed / this.duration, 1);
            this.drawFrame(progress);
            if (elapsed < this.duration) {
                this.animationFrame = requestAnimationFrame(this.animate.bind(this));
            }
        }

        start() {
            super.start();
            this.onResize();
            cancelAnimationFrame(this.animationFrame);
            this.startTime = null;
            this.animationFrame = requestAnimationFrame(this.animate.bind(this));
        }

        stop() {
            super.stop();
            cancelAnimationFrame(this.animationFrame);
        }
    }

    class SpeedometerAnimation extends BaseAnimation {
        constructor(containerId, config) {
            super(containerId);
            this.config = config;
            this.duration = config.duration || 10000;
            this.canvas = document.createElement('canvas');
            this.container.appendChild(this.canvas);
            this.ctx = this.canvas.getContext('2d');
            this.speedometer = document.createElement('div');
            this.speedometer.className = 'speedometer';
            this.needle = document.createElement('div');
            this.needle.className = 'needle';
            this.speedValue = document.createElement('div');
            this.speedValue.className = 'speed-value';
            this.speedometer.appendChild(this.needle);
            this.speedometer.appendChild(document.createElement('div')).className = 'center';
            this.speedometer.appendChild(this.speedValue);
            this.container.appendChild(this.speedometer);
            this.resizeObserver = new ResizeObserver(() => this.onResize());
            this.resizeObserver.observe(this.container);
            this.onResize();
        }

        getDuration() {
            return this.duration + 1000;
        }

        onResize() {
            this.canvas.width = this.container.clientWidth;
            this.canvas.height = this.container.clientHeight;
            this.speedometer.style.top = `${this.container.clientHeight / 2}px`;
            this.drawFrame(0);
        }

        drawAxes(ctx, originX, originY, width, height) {
            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
            ctx.lineWidth = 1.2;
            ctx.beginPath();
            ctx.moveTo(originX, originY);
            ctx.lineTo(originX + width, originY);
            ctx.moveTo(originX, originY);
            ctx.lineTo(originX, originY - height);
            ctx.stroke();
        }

        drawCurve(ctx, originX, originY, width, height) {
            ctx.beginPath();
            const samples = 240;
            for (let i = 0; i <= samples; i++) {
                const t = this.config.domain[0] + (i / samples) * (this.config.domain[1] - this.config.domain[0]);
                const s = this.config.displacement(t);
                const x = originX + (t / this.config.domain[1]) * width;
                const y = originY - (s / this.config.displacement(this.config.domain[1])) * height;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.strokeStyle = 'rgba(127,127,255,0.9)';
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        drawFrame(progress) {
            const ctx = this.ctx;
            const w = this.canvas.width;
            const h = this.canvas.height;
            ctx.clearRect(0, 0, w, h);

            const originX = w * 0.12;
            const originY = h * 0.8;
            const width = w * 0.6;
            const height = h * 0.6;

            this.drawAxes(ctx, originX, originY, width, height);
            this.drawCurve(ctx, originX, originY, width, height);

            const t = this.config.domain[0] + progress * (this.config.domain[1] - this.config.domain[0]);
            const s = this.config.displacement(t);
            const v = this.config.velocity(t);
            const x = originX + (t / this.config.domain[1]) * width;
            const y = originY - (s / this.config.displacement(this.config.domain[1])) * height;

            ctx.fillStyle = '#ffcf5b';
            ctx.beginPath();
            ctx.arc(x, y, 8, 0, Math.PI * 2);
            ctx.fill();

            const slopeLength = 80;
            const slope = this.config.velocity(t);
            const angle = Math.atan(slope * (height / width) / (this.config.domain[1]));
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.strokeStyle = '#48c6ef';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(-slopeLength, slopeLength * 0.4);
            ctx.lineTo(slopeLength, -slopeLength * 0.4);
            ctx.stroke();
            ctx.restore();

            const minVel = this.config.velocity(this.config.domain[0]);
            const maxVel = this.config.velocity(this.config.domain[1]);
            const normalized = (v - minVel) / (maxVel - minVel);
            const angleDeg = -130 + normalized * 260;
            this.needle.style.transform = `rotate(${angleDeg}deg)`;
            this.speedValue.textContent = `${v.toFixed(2)} 单位/秒`;
        }

        animate(timestamp) {
            if (!this.isPlaying) return;
            if (!this.startTime) this.startTime = timestamp;
            const elapsed = timestamp - this.startTime;
            const progress = Math.min(elapsed / this.duration, 1);
            this.drawFrame(progress);
            if (elapsed < this.duration) {
                this.animationFrame = requestAnimationFrame(this.animate.bind(this));
            }
        }

        start() {
            super.start();
            this.onResize();
            cancelAnimationFrame(this.animationFrame);
            this.startTime = null;
            this.animationFrame = requestAnimationFrame(this.animate.bind(this));
        }

        stop() {
            super.stop();
            cancelAnimationFrame(this.animationFrame);
        }
    }
