<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频3.1 导数的核心概念与几何意义</title>
    <link rel="stylesheet" href="./noto-serif-sc.css">
    <style>
        :root {
            --bg: #0b1026;
            --panel: rgba(12, 18, 40, 0.92);
            --accent: #48c6ef;
            --accent-soft: rgba(72, 198, 239, 0.25);
            --secondary: #7f7fff;
            --text-strong: #f2f5ff;
            --text-soft: #cbd5ff;
            --grid-line: rgba(203, 213, 255, 0.18);
            --border: rgba(120, 145, 255, 0.35);
            --shadow: 0 15px 40px rgba(0, 0, 0, 0.45);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', 'Source Han Serif SC', '宋体', serif;
            background: radial-gradient(circle at top, #141c3a, #050714 55%);
            color: var(--text-strong);
            overflow: hidden;
            height: 100vh;
        }

        .stage {
            display: grid;
            grid-template-rows: 80px 1fr 140px;
            height: 100vh;
            width: 100vw;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        header .title-block h1 {
            font-size: 1.45rem;
            letter-spacing: 0.08em;
        }

        header .title-block span {
            display: block;
            margin-top: 6px;
            font-size: 0.85rem;
            color: var(--text-soft);
        }

        header .status-badge {
            font-size: 0.85rem;
            padding: 6px 18px;
            border-radius: 999px;
            background: linear-gradient(135deg, rgba(72, 198, 239, 0.18), rgba(127, 127, 255, 0.18));
            border: 1px solid rgba(72, 198, 239, 0.45);
            color: var(--accent);
        }

        .content {
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 18px;
            padding: 24px 40px;
        }

        .blackboard {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 26px 24px 28px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: var(--shadow);
        }

        .blackboard h2 {
            font-size: 1.3rem;
            color: var(--accent);
            letter-spacing: 0.05em;
        }

        .blackboard .note {
            font-size: 0.92rem;
            line-height: 1.75;
            color: var(--text-soft);
        }

        .blackboard .formula {
            background: rgba(72, 198, 239, 0.12);
            border: 1px solid rgba(72, 198, 239, 0.35);
            border-radius: 12px;
            padding: 14px 18px;
            color: var(--accent);
            font-size: 1rem;
        }

        .slide-deck {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 22px;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transform: translateY(25px) scale(0.98);
            transition: opacity 0.6s ease, transform 0.6s ease;
            display: grid;
            grid-template-rows: auto 1fr;
        }

        .slide.active {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .slide header {
            background: transparent;
            border: none;
            box-shadow: none;
            padding: 0 0 12px;
        }

        .slide-title {
            font-size: 1.2rem;
            letter-spacing: 0.08em;
            color: var(--text-strong);
            margin-bottom: 8px;
        }

        .animation-plane {
            border-radius: 18px;
            background: rgba(6, 10, 26, 0.95);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px 40px 32px;
            background: var(--panel);
            border-top: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .btn-group {
            display: flex;
            gap: 16px;
        }

        button {
            border: 1px solid rgba(72, 198, 239, 0.55);
            background: rgba(72, 198, 239, 0.12);
            color: var(--text-strong);
            padding: 12px 24px;
            border-radius: 999px;
            font-size: 0.95rem;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
        }

        button:hover {
            background: rgba(72, 198, 239, 0.2);
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none;
        }

        .slide-indicator {
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            color: var(--text-soft);
        }

        .subtitle-area {
            margin-top: 18px;
            padding: 18px 24px;
            border-radius: 12px;
            background: rgba(80, 90, 130, 0.12);
            border: 1px solid rgba(80, 90, 130, 0.24);
            color: var(--text-soft);
            line-height: 1.6;
        }

        .delta-label {
            position: absolute;
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 6px;
            background: rgba(72, 198, 239, 0.16);
            border: 1px solid rgba(72, 198, 239, 0.35);
            color: var(--accent);
        }

        .question-card {
            position: absolute;
            bottom: 22px;
            right: 22px;
            padding: 18px 24px;
            background: rgba(18, 24, 48, 0.9);
            border: 1px solid rgba(72, 198, 239, 0.45);
            border-radius: 14px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.45);
            max-width: 340px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease;
        }

        .question-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .question-card h3 {
            font-size: 1rem;
            letter-spacing: 0.08em;
            margin-bottom: 10px;
            color: var(--accent);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            text-align: center;
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            color: var(--text-soft);
        }

        tr.visible {
            animation: rowReveal 0.6s ease forwards;
        }

        @keyframes rowReveal {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .speedometer {
            position: absolute;
            right: 24px;
            top: 50%;
            transform: translateY(-50%);
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 45%, rgba(72,198,239,0.28), rgba(10,15,34,0.9));
            border: 1px solid rgba(72, 198, 239, 0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.45);
        }

        .speedometer .needle {
            width: 6px;
            height: 85px;
            background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(72, 198, 239, 0.7));
            transform-origin: 50% 80%;
            border-radius: 6px;
            position: absolute;
            bottom: 42px;
            transition: transform 0.08s ease-out;
        }

        .speedometer .center {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 12px rgba(72,198,239,0.6);
        }

        .speed-value {
            position: absolute;
            bottom: 26px;
            font-size: 1.2rem;
            color: var(--text-strong);
        }

        .compare-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: 100%;
        }

        .compare-panel {
            position: relative;
            padding: 20px;
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        .compare-panel:last-child {
            border-right: none;
        }

        .compare-title {
            font-size: 1rem;
            margin-bottom: 12px;
            letter-spacing: 0.08em;
            color: var(--accent);
        }

        .warning-label {
            position: absolute;
            top: 18px;
            right: 18px;
            padding: 8px 12px;
            border-radius: 8px;
            background: rgba(255, 99, 132, 0.16);
            border: 1px solid rgba(255, 99, 132, 0.55);
            color: #ff718d;
            font-size: 0.85rem;
            letter-spacing: 0.08em;
            animation: pulse 1.2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.72; }
            50% { transform: scale(1.06); opacity: 1; }
        }

        .cusp-highlight {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 18px;
            border-radius: 999px;
            background: rgba(255, 99, 132, 0.18);
            border: 1px solid rgba(255, 99, 132, 0.55);
            color: #ff8ba1;
            letter-spacing: 0.12em;
        }

        .mathjax {
            font-size: 0.98rem;
        }
    </style>
</head>
<body>
    <div class="stage">
        <header>
            <div class="title-block">
                <h1>视频 3.1 · 导数的核心概念与几何意义</h1>
                <span>依据《视频课程生产蓝图.md》附录A六页版——专业数字教材舞台</span>
            </div>
            <div class="status-badge" id="statusIndicator">系统就绪</div>
        </header>

        <div class="content">
            <aside class="blackboard">
                <h2 id="boardTitle">板书标题</h2>
                <div class="note" id="boardContent"></div>
                <div class="formula mathjax" id="boardFormula"></div>
                <div class="subtitle-area" id="subtitleArea">自动播放时，字幕将同步呈现讲稿内容。</div>
            </aside>

            <section class="slide-deck">
                <div id="slidesContainer"></div>
            </section>
        </div>

        <footer class="controls">
            <div class="slide-indicator" id="slideIndicator">第 1 / 6 页</div>
            <div class="btn-group">
                <button id="prevBtn">上一页</button>
                <button id="playBtn">自动播放</button>
                <button id="nextBtn">下一页</button>
            </div>
        </footer>
    </div>

    <script src="./mathjax-tex-mml-chtml.js"></script>
    <script>
    const courseData = {
        totalSlides: 6,
        slides: [
            {
                id: 'slide-1',
                title: '瞬时变化率的直观需求',
                blackboard: {
                    title: '导数引入：为何需要瞬时速度？',
                    content: `
                        <p>· 观察一辆赛车沿弯道行驶的全过程，位移 <em>s</em>(t) 呈非线性变化。</p>
                        <p>· 平均速度 = <span class="mathjax">\(\dfrac{\Delta s}{\Delta t}\)</span> 只能描述一个区间内的整体变化。</p>
                        <p>· 关键问题：<strong>在某一瞬间</strong>，车辆的速度如何刻画？</p>
                    `,
                    formula: '\\(s(t)=12t^2+4t+6\\sin(1.6t)\\)'
                },
                script: '赛车行驶呈现复杂的位移变化曲线，我们关心的是在某一个具体时刻的瞬时速度，这就是导数概念诞生的背景。',
                animation: {
                    type: 'PhysicsIntroAnimation',
                    config: {
                        duration: 12000,
                        pathPoints: [
                            { x: 0.1, y: 0.8 },
                            { x: 0.2, y: 0.6 },
                            { x: 0.35, y: 0.5 },
                            { x: 0.45, y: 0.35 },
                            { x: 0.6, y: 0.3 },
                            { x: 0.75, y: 0.42 },
                            { x: 0.88, y: 0.25 }
                        ],
                        displacementFunction: function(t) {
                            return 12 * t * t + 4 * t + 6 * Math.sin(1.6 * t);
                        }
                    }
                }
            },
            {
                id: 'slide-2',
                title: '割线斜率的极限想法',
                blackboard: {
                    title: '极限定义：先有割线，再谈切线',
                    content: `
                        <p>· 选择曲线 <span class="mathjax">\(y=x^2\)</span>，固定点 <span class="mathjax">P(1,1)</span>。</p>
                        <p>· 让点 <span class="mathjax">Q(1+\Delta x,(1+\Delta x)^2)</span> 在曲线上移动。</p>
                        <p>· 割线斜率：<span class="mathjax">\(m_{PQ}=\dfrac{\Delta y}{\Delta x}=\dfrac{(1+\Delta x)^2-1}{\Delta x}\)</span></p>
                    `,
                    formula: '\\(m_{PQ}=\dfrac{(1+\Delta x)^2-1}{\Delta x}\\)'
                },
                script: '通过观察割线的变化，我们可以用数值的方式追踪斜率。随着点Q沿曲线移动，割线的斜率实时更新，为极限思想埋下伏笔。',
                animation: {
                    type: 'DerivativeAnimation',
                    config: {
                        mode: 'secant',
                        initialDx: 2,
                        minDx: 0.4,
                        duration: 9000
                    }
                }
            },
            {
                id: 'slide-3',
                title: '极限过程与切线诞生',
                blackboard: {
                    title: '从割线到切线：导数的几何意义',
                    content: `
                        <p>· 让 <span class="mathjax">\(\Delta x\)</span> 从 2 平滑减小至 0.01，割线逐步转化为切线。</p>
                        <p>· 实时监测 <span class="mathjax">\(m_{PQ}\)</span> 的变化，并最终得到 <span class="mathjax">\(f'(1)=2\)</span>。</p>
                        <p>· 切线呈现为极限意义下的唯一方向。</p>
                    `,
                    formula: "\\(\lim_{\Delta x\to 0}\dfrac{\Delta y}{\Delta x}=f'(1)=2\\)"
                },
                script: '随着点Q逐渐逼近P，割线最终与曲线只在一点相切，切线斜率稳定在二，完整呈现导数的几何诠释。',
                animation: {
                    type: 'DerivativeAnimation',
                    config: {
                        mode: 'tangent',
                        initialDx: 2,
                        minDx: 0.01,
                        duration: 9000
                    }
                }
            },
            {
                id: 'slide-4',
                title: '数值近似验证导数',
                blackboard: {
                    title: '用数据接近导数值',
                    content: `
                        <p>· 通过逐步缩小 <span class="mathjax">\(\Delta x\)</span>，计算割线斜率。</p>
                        <p>· 观察斜率如何逼近真实导数 <span class="mathjax">2</span>。</p>
                        <p>· 同时记录误差 <span class="mathjax">|m_{PQ}-2|</span>。</p>
                    `,
                    formula: '\\(\begin{array}{c|c|c}\Delta x & m_{PQ} & |m_{PQ}-2|\\\\\end{array}\\)'
                },
                script: '表格中的数据一行行呈现，展示割线斜率如何快速逼近真实导数值二，数值观察与几何直觉完美契合。',
                animation: {
                    type: 'TableAnimation',
                    config: {
                        rows: [
                            { dx: 0.5, slope: ((1.5*1.5 - 1)/0.5).toFixed(3) },
                            { dx: 0.1, slope: ((1.1*1.1 - 1)/0.1).toFixed(4) },
                            { dx: 0.05, slope: ((1.05*1.05 - 1)/0.05).toFixed(4) },
                            { dx: 0.01, slope: ((1.01*1.01 - 1)/0.01).toFixed(5) },
                            { dx: 0.005, slope: ((1.005*1.005 - 1)/0.005).toFixed(5) }
                        ],
                        trueDerivative: 2
                    }
                }
            },
            {
                id: 'slide-5',
                title: '瞬时速度的物理诠释',
                blackboard: {
                    title: '切线斜率 = 瞬时速度',
                    content: `
                        <p>· 位移函数 <span class="mathjax">s(t)=6t+1.75t^2</span>。</p>
                        <p>· 瞬时速度 <span class="mathjax">v(t)=s'(t)=6+3.5t</span>。</p>
                        <p>· 将切线斜率映射到速度计，直观呈现速度变化。</p>
                    `,
                    formula: "\\(v(t)=s'(t)=6+3.5t\\)"
                },
                script: '当指示点沿着位移曲线运动，实时计算的切线斜率驱动速度计指针。瞬时速度的物理意义被直接可视化出来。',
                animation: {
                    type: 'SpeedometerAnimation',
                    config: {
                        displacement: function(t) { return 6 * t + 1.75 * t * t; },
                        velocity: function(t) { return 6 + 3.5 * t; },
                        domain: [0, 6],
                        duration: 10000
                    }
                }
            },
            {
                id: 'slide-6',
                title: '总结与易错警示',
                blackboard: {
                    title: '正确理解导数，警惕不可导情形',
                    content: `
                        <p>· 切线斜率代表瞬时变化率，区别于平均变化率。</p>
                        <p>· 平滑曲线上导数存在，而尖点、拐角处导数可能不存在。</p>
                        <p>· 以 <span class="mathjax">|x|</span> 在 <span class="mathjax">x=0</span> 处为例，左右斜率不一致，不可导。</p>
                    `,
                    formula: '\\(\text{导数存在} \Rightarrow \text{左右极限一致}\\)'
                },
                script: '牢记导数描述的是瞬时变化率：正确的切线应依附于一点，而平均变化率只是割线。面对尖点函数如绝对值，导数无法定义。',
                animation: {
                    type: 'ComparisonAnimation',
                    config: {}
                }
            }
        ]
    };

    class SlideManager {
        constructor(data) {
            this.data = data;
            this.current = 0;
            this.animationControllers = new Map();
            this.activeController = null;
            this.init();
        }

        init() {
            this.container = document.getElementById('slidesContainer');
            this.boardTitle = document.getElementById('boardTitle');
            this.boardContent = document.getElementById('boardContent');
            this.boardFormula = document.getElementById('boardFormula');
            this.subtitleArea = document.getElementById('subtitleArea');
            this.statusIndicator = document.getElementById('statusIndicator');
            this.buildSlides();
            this.bindControls();
            this.showSlide(0, true);
        }

        buildSlides() {
            this.data.slides.forEach((slide, index) => {
                const slideEl = document.createElement('div');
                slideEl.className = 'slide';
                slideEl.dataset.index = index;
                slideEl.innerHTML = `
                    <div class="slide-header">
                        <div class="slide-title">${slide.title}</div>
                    </div>
                    <div class="animation-plane" id="anim-${slide.id}"></div>
                `;
                this.container.appendChild(slideEl);
                const controller = AnimationFactory.create(slide.animation.type, slide.animation.config, `anim-${slide.id}`);
                this.animationControllers.set(index, controller);
            });
        }

        bindControls() {
            document.getElementById('prevBtn').addEventListener('click', () => this.showSlide(this.current - 1));
            document.getElementById('nextBtn').addEventListener('click', () => this.showSlide(this.current + 1));
            document.getElementById('playBtn').addEventListener('click', () => this.autoPlay());
        }

        async autoPlay() {
            if (this.isPlaying) return;
            this.isPlaying = true;
            this.statusIndicator.textContent = '自动播放中...';
            for (let i = 0; i < this.data.slides.length; i++) {
                this.showSlide(i);
                const controller = this.animationControllers.get(i);
                await controller.playScripted(this.data.slides[i].script);
            }
            this.statusIndicator.textContent = '自动播放结束';
            this.isPlaying = false;
        }

        showSlide(index, immediate = false) {
            if (index < 0 || index >= this.data.totalSlides) return;
            if (!immediate && index === this.current) return;

            const previousSlide = this.container.querySelector('.slide.active');
            if (previousSlide) {
                previousSlide.classList.remove('active');
            }

            const targetSlide = this.container.querySelector(`.slide[data-index="${index}"]`);
            if (targetSlide) {
                targetSlide.classList.add('active');
            }

            this.current = index;
            this.updateBoard(this.data.slides[index]);
            this.updateControls();
            this.switchAnimation(index);
        }

        updateBoard(slide) {
            this.boardTitle.innerHTML = slide.blackboard.title;
            this.boardContent.innerHTML = slide.blackboard.content;
            this.boardFormula.innerHTML = slide.blackboard.formula;
            this.subtitleArea.textContent = slide.script;
            MathJax.typesetPromise();
        }

        updateControls() {
            document.getElementById('slideIndicator').textContent = `第 ${this.current + 1} / ${this.data.totalSlides} 页`;
            document.getElementById('prevBtn').disabled = this.current === 0;
            document.getElementById('nextBtn').disabled = this.current === this.data.totalSlides - 1;
        }

        switchAnimation(index) {
            if (this.activeController) {
                this.activeController.stop();
            }
            const controller = this.animationControllers.get(index);
            this.activeController = controller;
            controller.start();
        }
    }

    class AnimationFactory {
        static create(type, config, containerId) {
            switch (type) {
                case 'PhysicsIntroAnimation':
                    return new PhysicsIntroAnimation(containerId, config);
                case 'DerivativeAnimation':
                    return new DerivativeAnimation(containerId, config);
                case 'TableAnimation':
                    return new TableAnimation(containerId, config);
                case 'SpeedometerAnimation':
                    return new SpeedometerAnimation(containerId, config);
                case 'ComparisonAnimation':
                    return new ComparisonAnimation(containerId, config);
                default:
                    throw new Error(`未知动画类型: ${type}`);
            }
        }
    }

    class BaseAnimation {
        constructor(containerId) {
            this.container = document.getElementById(containerId);
            this.isPlaying = false;
            this.lastTimestamp = 0;
        }

        start() {
            this.isPlaying = true;
            this.lastTimestamp = 0;
        }

        stop() {
            this.isPlaying = false;
        }

        playScripted(script) {
            return new Promise(resolve => {
                this.start();
                const duration = this.getDuration ? this.getDuration() : 8000;
                setTimeout(() => {
                    this.stop();
                    resolve();
                }, duration);
            });
        }
    }

    class PhysicsIntroAnimation extends BaseAnimation {
        constructor(containerId, config) {
            super(containerId);
            this.config = config;
            this.duration = config.duration || 12000;
            this.canvas = document.createElement('canvas');
            this.canvas.width = this.container.clientWidth;
            this.canvas.height = this.container.clientHeight;
            this.container.appendChild(this.canvas);
            this.ctx = this.canvas.getContext('2d');
            this.resizeObserver = new ResizeObserver(() => this.onResize());
            this.resizeObserver.observe(this.container);
            this.questionCard = document.createElement('div');
            this.questionCard.className = 'question-card';
            this.questionCard.innerHTML = `
                <h3>核心问题</h3>
                <p>在 <span class="mathjax">t=t_0</span> 这一瞬间，速度究竟是多少？</p>
            `;
            this.container.appendChild(this.questionCard);
        }

        getDuration() {
            return this.duration + 1500;
        }

        onResize() {
            this.canvas.width = this.container.clientWidth;
            this.canvas.height = this.container.clientHeight;
            this.drawFrame(0);
        }

        catmullRomSpline(points, t) {
            const n = points.length;
            if (n < 2) return points[0];
            const p = (n - 1) * t;
            const i = Math.floor(p);
            const localT = p - i;
            const p0 = points[Math.max(0, i - 1)];
            const p1 = points[i];
            const p2 = points[Math.min(n - 1, i + 1)];
            const p3 = points[Math.min(n - 1, i + 2)];

            const tt = localT * localT;
            const ttt = tt * localT;

            const q0 = -0.5 * ttt + tt - 0.5 * localT;
            const q1 = 1.5 * ttt - 2.5 * tt + 1;
            const q2 = -1.5 * ttt + 2 * tt + 0.5 * localT;
            const q3 = 0.5 * ttt - 0.5 * tt;

            return {
                x: this.canvas.width * (q0 * p0.x + q1 * p1.x + q2 * p2.x + q3 * p3.x),
                y: this.canvas.height * (q0 * p0.y + q1 * p1.y + q2 * p2.y + q3 * p3.y)
            };
        }

        drawFrame(progress) {
            const ctx = this.ctx;
            const { width, height } = this.canvas;
            ctx.clearRect(0, 0, width, height);

            ctx.strokeStyle = 'rgba(75, 154, 255, 0.35)';
            ctx.lineWidth = 2;
            ctx.setLineDash([6, 8]);
            ctx.strokeRect(24, 24, width * 0.45 - 48, height - 48);
            ctx.setLineDash([]);

            ctx.save();
            ctx.beginPath();
            const steps = 200;
            for (let i = 0; i <= steps; i++) {
                const { x, y } = this.catmullRomSpline(this.config.pathPoints, i / steps);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.strokeStyle = 'rgba(72,198,239,0.6)';
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.restore();

            const carT = Math.min(progress, 0.98);
            const carPos = this.catmullRomSpline(this.config.pathPoints, carT);
            const aheadPos = this.catmullRomSpline(this.config.pathPoints, Math.min(carT + 0.01, 0.99));
            const angle = Math.atan2(aheadPos.y - carPos.y, aheadPos.x - carPos.x);

            ctx.save();
            ctx.translate(carPos.x, carPos.y);
            ctx.rotate(angle);
            ctx.fillStyle = '#ffcf5b';
            ctx.shadowBlur = 20;
            ctx.shadowColor = 'rgba(255,207,91,0.45)';
            ctx.fillRect(-22, -12, 44, 24);
            ctx.fillStyle = '#1a213f';
            ctx.fillRect(-14, -10, 28, 20);
            ctx.restore();

            const graphX = width * 0.5;
            const graphWidth = width * 0.45;
            const graphHeight = height - 48;

            ctx.save();
            ctx.translate(graphX, 24);
            ctx.strokeStyle = 'rgba(255,255,255,0.12)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 6; i++) {
                const x = (graphWidth / 6) * i;
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, graphHeight);
                ctx.stroke();
            }
            for (let i = 0; i <= 6; i++) {
                const y = (graphHeight / 6) * i;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(graphWidth, y);
                ctx.stroke();
            }

            const sampleCount = 240;
            ctx.beginPath();
            for (let i = 0; i <= sampleCount; i++) {
                const t = (i / sampleCount) * 6;
                const s = this.config.displacementFunction(t);
                const x = (i / sampleCount) * graphWidth;
                const sNorm = (s - 0) / 320;
                const y = graphHeight - sNorm * graphHeight;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.strokeStyle = 'rgba(127, 127, 255, 0.9)';
            ctx.lineWidth = 3;
            ctx.stroke();

            const currentT = carT * 6;
            const currentS = this.config.displacementFunction(currentT);
            const dotX = carT * graphWidth;
            const dotY = graphHeight - (currentS / 320) * graphHeight;
            ctx.fillStyle = '#ffcf5b';
            ctx.beginPath();
            ctx.arc(dotX, dotY, 7, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();

            ctx.fillStyle = 'rgba(255,255,255,0.65)';
            ctx.font = '16px "Noto Serif SC"';
            ctx.fillText('位移-时间图像 s(t)', graphX + 10, 40);
            ctx.fillText('赛道运动示意', 36, 40);
        }

        animate(timestamp) {
            if (!this.isPlaying) return;
            if (!this.startTime) this.startTime = timestamp;
            const elapsed = timestamp - this.startTime;
            const progress = Math.min(elapsed / this.duration, 1);
            this.drawFrame(progress);
            if (elapsed < this.duration) {
                this.animationFrame = requestAnimationFrame(this.animate.bind(this));
            } else {
                this.questionCard.classList.add('visible');
                MathJax.typesetPromise();
            }
        }

        start() {
            super.start();
            this.questionCard.classList.remove('visible');
            this.startTime = null;
            cancelAnimationFrame(this.animationFrame);
            this.animationFrame = requestAnimationFrame(this.animate.bind(this));
        }

        stop() {
            super.stop();
            cancelAnimationFrame(this.animationFrame);
        }
    }

    class DerivativeAnimation extends BaseAnimation {
        constructor(containerId, config) {
            super(containerId);
            this.config = config;
            this.duration = config.duration || 8000;
            this.canvas = document.createElement('canvas');
            this.container.appendChild(this.canvas);
            this.ctx = this.canvas.getContext('2d');
            this.onResize = this.onResize.bind(this);
            this.resizeObserver = new ResizeObserver(this.onResize);
            this.resizeObserver.observe(this.container);
            this.onResize();
            this.deltaLabelX = document.createElement('div');
            this.deltaLabelX.className = 'delta-label';
            this.deltaLabelX.textContent = 'Δx';
            this.container.appendChild(this.deltaLabelX);
            this.deltaLabelY = document.createElement('div');
            this.deltaLabelY.className = 'delta-label';
            this.deltaLabelY.textContent = 'Δy';
            this.container.appendChild(this.deltaLabelY);
            this.slopeDisplay = document.createElement('div');
            this.slopeDisplay.className = 'question-card';
            this.container.appendChild(this.slopeDisplay);
        }

        getDuration() {
            return this.duration + 1200;
        }

        onResize() {
            this.canvas.width = this.container.clientWidth;
            this.canvas.height = this.container.clientHeight;
            this.drawFrame(0);
        }

        computeSlope(dx) {
            const dy = (1 + dx) * (1 + dx) - 1;
            return dy / dx;
        }

        easeOutCubic(t) {
            return 1 - Math.pow(1 - t, 3);
        }

        drawFrame(progress) {
            const ctx = this.ctx;
            const w = this.canvas.width;
            const h = this.canvas.height;
            ctx.clearRect(0, 0, w, h);

            ctx.save();
            ctx.translate(w * 0.1, h * 0.85);
            const scaleX = w * 0.7;
            const scaleY = h * 0.7;

            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 6; i++) {
                const x = (scaleX / 6) * i;
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, -scaleY);
                ctx.stroke();
            }
            for (let i = 0; i <= 6; i++) {
                const y = (-scaleY / 6) * i;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(scaleX, y);
                ctx.stroke();
            }

            ctx.beginPath();
            for (let i = 0; i <= 200; i++) {
                const x = i / 200 * 3;
                const y = x * x;
                const px = x / 3 * scaleX;
                const py = -y / 5 * scaleY;
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.strokeStyle = 'rgba(127,127,255,0.9)';
            ctx.lineWidth = 3;
            ctx.stroke();

            const dx = this.config.mode === 'secant'
                ? this.config.initialDx - (this.config.initialDx - this.config.minDx) * progress
                : this.config.initialDx - (this.config.initialDx - this.config.minDx) * this.easeOutCubic(progress);
            const clampedDx = Math.max(this.config.minDx, dx);
            const P = { x: 1, y: 1 };
            const Q = { x: 1 + clampedDx, y: (1 + clampedDx) * (1 + clampedDx) };

            const Px = (P.x / 3) * scaleX;
            const Py = -(P.y / 5) * scaleY;
            const Qx = (Q.x / 3) * scaleX;
            const Qy = -(Q.y / 5) * scaleY;

            ctx.fillStyle = '#ffcf5b';
            ctx.beginPath();
            ctx.arc(Px, Py, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(Qx, Qy, 8, 0, Math.PI * 2);
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(Px, Py);
            ctx.lineTo(Qx, Qy);
            ctx.strokeStyle = this.config.mode === 'tangent' && progress >= 0.98 ? '#48c6ef' : 'rgba(255,207,91,0.85)';
            ctx.lineWidth = 3;
            ctx.stroke();

            ctx.setLineDash([6, 6]);
            ctx.beginPath();
            ctx.moveTo(Qx, Py);
            ctx.lineTo(Qx, Qy);
            ctx.moveTo(Px, Py);
            ctx.lineTo(Qx, Py);
            ctx.strokeStyle = 'rgba(255,255,255,0.25)';
            ctx.stroke();
            ctx.setLineDash([]);

            const slope = this.computeSlope(clampedDx);
            ctx.restore();

            const labelX = this.deltaLabelX;
            labelX.style.left = `${this.canvas.offsetLeft + (Px + Qx) / 2 - 20}px`;
            labelX.style.top = `${this.canvas.offsetTop + this.canvas.height * 0.78}px`;
            const labelY = this.deltaLabelY;
            labelY.style.left = `${this.canvas.offsetLeft + Qx + 10}px`;
            labelY.style.top = `${this.canvas.offsetTop + (Py + Qy) / 2 - 10}px`;

            const slopeText = this.config.mode === 'tangent' && progress >= 0.98
                ? "\\(f'(1)=2.000\\)"
                : `\\(m_{PQ}=${slope.toFixed(3)}\\)`;
            this.slopeDisplay.innerHTML = `
                <h3>${this.config.mode === 'tangent' ? '切线诞生' : '割线斜率'}</h3>
                <p><span class="mathjax">${slopeText}</span></p>
                <p>Δx=${clampedDx.toFixed(3)}，Δy=${((1 + clampedDx) ** 2 - 1).toFixed(3)}</p>
            `;
            this.slopeDisplay.classList.add('visible');
            MathJax.typesetPromise();
        }

        animate(timestamp) {
            if (!this.isPlaying) return;
            if (!this.startTime) this.startTime = timestamp;
            const elapsed = timestamp - this.startTime;
            const progress = Math.min(elapsed / this.duration, 1);
            this.drawFrame(progress);
            if (elapsed < this.duration) {
                this.animationFrame = requestAnimationFrame(this.animate.bind(this));
            }
        }

        start() {
            super.start();
            cancelAnimationFrame(this.animationFrame);
            this.deltaLabelX.style.opacity = '1';
            this.deltaLabelY.style.opacity = '1';
            this.slopeDisplay.classList.add('visible');
            this.startTime = null;
            this.animationFrame = requestAnimationFrame(this.animate.bind(this));
        }

        stop() {
            super.stop();
            cancelAnimationFrame(this.animationFrame);
        }
    }

    class TableAnimation extends BaseAnimation {
        constructor(containerId, config) {
            super(containerId);
            this.config = config;
            this.duration = 7000;
            this.buildTable();
        }

        buildTable() {
            const wrapper = document.createElement('div');
            wrapper.style.position = 'absolute';
            wrapper.style.inset = '0';
            wrapper.style.padding = '32px';
            wrapper.style.display = 'flex';
            wrapper.style.flexDirection = 'column';
            wrapper.style.justifyContent = 'center';
            wrapper.style.gap = '18px';

            const title = document.createElement('div');
            title.className = 'slide-title';
            title.textContent = '割线斜率的数值逼近';
            wrapper.appendChild(title);

            const table = document.createElement('table');
            table.innerHTML = `
                <thead>
                    <tr>
                        <th>Δx</th>
                        <th>割线斜率</th>
                        <th>|m_{PQ}-2|</th>
                    </tr>
                </thead>
                <tbody></tbody>
            `;
            wrapper.appendChild(table);
            this.tableBody = table.querySelector('tbody');

            const note = document.createElement('div');
            note.className = 'note';
            note.innerHTML = 'Δx 越小，割线斜率越贴近切线斜率 2。数值验证了极限过程。';
            wrapper.appendChild(note);

            this.container.appendChild(wrapper);
        }

        start() {
            super.start();
            this.tableBody.innerHTML = '';
            this.config.rows.forEach((row, index) => {
                setTimeout(() => {
                    const tr = document.createElement('tr');
                    const slope = parseFloat(row.slope);
                    const error = Math.abs(slope - this.config.trueDerivative);
                    tr.innerHTML = `
                        <td>${row.dx}</td>
                        <td>${slope.toFixed(5)}</td>
                        <td>${error.toFixed(5)}</td>
                    `;
                    tr.classList.add('visible');
                    this.tableBody.appendChild(tr);
                }, 600 * index);
            });
        }
    }

    class SpeedometerAnimation extends BaseAnimation {
        constructor(containerId, config) {
            super(containerId);
            this.config = config;
            this.duration = config.duration || 10000;
            this.canvas = document.createElement('canvas');
            this.container.appendChild(this.canvas);
            this.ctx = this.canvas.getContext('2d');
            this.speedometer = document.createElement('div');
            this.speedometer.className = 'speedometer';
            this.needle = document.createElement('div');
            this.needle.className = 'needle';
            this.speedValue = document.createElement('div');
            this.speedValue.className = 'speed-value';
            this.speedometer.appendChild(this.needle);
            this.speedometer.appendChild(document.createElement('div')).className = 'center';
            this.speedometer.appendChild(this.speedValue);
            this.container.appendChild(this.speedometer);
            this.resizeObserver = new ResizeObserver(() => this.onResize());
            this.resizeObserver.observe(this.container);
            this.onResize();
        }

        getDuration() {
            return this.duration + 1000;
        }

        onResize() {
            this.canvas.width = this.container.clientWidth;
            this.canvas.height = this.container.clientHeight;
            this.speedometer.style.top = `${this.container.clientHeight / 2}px`;
            this.drawFrame(0);
        }

        drawAxes(ctx, originX, originY, width, height) {
            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
            ctx.lineWidth = 1.2;
            ctx.beginPath();
            ctx.moveTo(originX, originY);
            ctx.lineTo(originX + width, originY);
            ctx.moveTo(originX, originY);
            ctx.lineTo(originX, originY - height);
            ctx.stroke();
        }

        drawCurve(ctx, originX, originY, width, height) {
            ctx.beginPath();
            const samples = 240;
            for (let i = 0; i <= samples; i++) {
                const t = this.config.domain[0] + (i / samples) * (this.config.domain[1] - this.config.domain[0]);
                const s = this.config.displacement(t);
                const x = originX + (t / this.config.domain[1]) * width;
                const y = originY - (s / this.config.displacement(this.config.domain[1])) * height;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.strokeStyle = 'rgba(127,127,255,0.9)';
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        drawFrame(progress) {
            const ctx = this.ctx;
            const w = this.canvas.width;
            const h = this.canvas.height;
            ctx.clearRect(0, 0, w, h);

            const originX = w * 0.12;
            const originY = h * 0.8;
            const width = w * 0.6;
            const height = h * 0.6;

            this.drawAxes(ctx, originX, originY, width, height);
            this.drawCurve(ctx, originX, originY, width, height);

            const t = this.config.domain[0] + progress * (this.config.domain[1] - this.config.domain[0]);
            const s = this.config.displacement(t);
            const v = this.config.velocity(t);
            const x = originX + (t / this.config.domain[1]) * width;
            const y = originY - (s / this.config.displacement(this.config.domain[1])) * height;

            ctx.fillStyle = '#ffcf5b';
            ctx.beginPath();
            ctx.arc(x, y, 8, 0, Math.PI * 2);
            ctx.fill();

            const slopeLength = 80;
            const slope = this.config.velocity(t);
            const angle = Math.atan(slope * (height / width) / (this.config.domain[1]));
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.strokeStyle = '#48c6ef';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(-slopeLength, slopeLength * 0.4);
            ctx.lineTo(slopeLength, -slopeLength * 0.4);
            ctx.stroke();
            ctx.restore();

            const minVel = this.config.velocity(this.config.domain[0]);
            const maxVel = this.config.velocity(this.config.domain[1]);
            const normalized = (v - minVel) / (maxVel - minVel);
            const angleDeg = -130 + normalized * 260;
            this.needle.style.transform = `rotate(${angleDeg}deg)`;
            this.speedValue.textContent = `${v.toFixed(2)} 单位/秒`;
        }

        animate(timestamp) {
            if (!this.isPlaying) return;
            if (!this.startTime) this.startTime = timestamp;
            const elapsed = timestamp - this.startTime;
            const progress = Math.min(elapsed / this.duration, 1);
            this.drawFrame(progress);
            if (elapsed < this.duration) {
                this.animationFrame = requestAnimationFrame(this.animate.bind(this));
            }
        }

        start() {
            super.start();
            cancelAnimationFrame(this.animationFrame);
            this.startTime = null;
            this.animationFrame = requestAnimationFrame(this.animate.bind(this));
        }

        stop() {
            super.stop();
            cancelAnimationFrame(this.animationFrame);
        }
    }

    class ComparisonAnimation extends BaseAnimation {
        constructor(containerId) {
            super(containerId);
            this.buildLayout();
            this.duration = 9000;
        }

        buildLayout() {
            const grid = document.createElement('div');
            grid.className = 'compare-grid';

            this.correctPanel = document.createElement('div');
            this.correctPanel.className = 'compare-panel';
            this.correctPanel.innerHTML = `
                <div class="compare-title">正确：切线 = 瞬时变化率</div>
                <svg width="100%" height="260" viewBox="0 0 400 260">
                    <defs>
                        <linearGradient id="gradCorrect" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="rgba(72,198,239,0.6)"/>
                            <stop offset="100%" stop-color="rgba(72,198,239,0.1)"/>
                        </linearGradient>
                    </defs>
                    <rect x="20" y="20" width="360" height="220" fill="none" stroke="rgba(255,255,255,0.15)" stroke-dasharray="6 8"/>
                    <path d="M40 200 Q 160 80 360 120" fill="none" stroke="url(#gradCorrect)" stroke-width="4"/>
                    <circle cx="160" cy="120" r="6" fill="#ffcf5b" />
                    <line x1="120" y1="150" x2="240" y2="90" stroke="#48c6ef" stroke-width="4" />
                    <text x="130" y="170" fill="#cbd5ff" font-size="16">切线斜率 = f'(a)</text>
                </svg>
            `;

            this.incorrectPanel = document.createElement('div');
            this.incorrectPanel.className = 'compare-panel';
            this.incorrectPanel.innerHTML = `
                <div class="compare-title">错误：割线 ≠ 瞬时变化率</div>
                <div class="warning-label">平均变化率</div>
                <svg width="100%" height="260" viewBox="0 0 400 260" id="compareSvg">
                    <rect x="20" y="20" width="360" height="220" fill="none" stroke="rgba(255,255,255,0.15)" stroke-dasharray="6 8"/>
                    <path id="wrongCurve" d="M40 200 Q 160 80 360 120" fill="none" stroke="rgba(255,99,132,0.6)" stroke-width="4"/>
                    <circle id="wrongP" cx="100" cy="160" r="6" fill="#ffcf5b" />
                    <circle id="wrongQ" cx="280" cy="110" r="6" fill="#ffcf5b" />
                    <line id="wrongSecant" x1="100" y1="160" x2="280" y2="110" stroke="rgba(255,99,132,0.8)" stroke-width="4" stroke-dasharray="10 6" />
                    <text x="140" y="210" fill="#ff8ba1" font-size="16">割线斜率 = 平均变化率</text>
                </svg>
            `;

            grid.appendChild(this.correctPanel);
            grid.appendChild(this.incorrectPanel);

            this.cuspLabel = document.createElement('div');
            this.cuspLabel.className = 'cusp-highlight';
            this.cuspLabel.textContent = '|x| 在 x=0 处不可导';
            this.cuspLabel.style.opacity = '0';

            this.container.appendChild(grid);
            this.container.appendChild(this.cuspLabel);
        }

        start() {
            super.start();
            const svg = this.incorrectPanel.querySelector('#compareSvg');
            const wrongCurve = svg.querySelector('#wrongCurve');
            const wrongSecant = svg.querySelector('#wrongSecant');
            const wrongQ = svg.querySelector('#wrongQ');

            wrongCurve.setAttribute('d', 'M40 200 Q 160 80 360 120');
            wrongSecant.setAttribute('x1', '100');
            wrongSecant.setAttribute('y1', '160');
            wrongSecant.setAttribute('x2', '280');
            wrongSecant.setAttribute('y2', '110');
            wrongSecant.setAttribute('stroke-dasharray', '10 6');
            wrongQ.setAttribute('cx', '280');
            wrongQ.setAttribute('cy', '110');
            this.cuspLabel.style.opacity = '0';

            setTimeout(() => {
                wrongCurve.setAttribute('d', 'M40 200 L 200 80 L 360 200');
                wrongSecant.setAttribute('x1', '200');
                wrongSecant.setAttribute('y1', '80');
                wrongSecant.setAttribute('x2', '200');
                wrongSecant.setAttribute('y2', '200');
                wrongSecant.setAttribute('stroke-dasharray', '');
                wrongSecant.setAttribute('stroke', 'rgba(255,99,132,0.95)');
                wrongQ.setAttribute('cx', '200');
                wrongQ.setAttribute('cy', '80');
                this.cuspLabel.style.opacity = '1';
            }, 4500);
        }
    }
