<html lang="zh-CN">
<head>

  <style>
    :root {
      --chalkboard-bg: #1a1a2e;
      --chalk-text: #e0e0e0;
      --highlight: #f1c40f;
      --accent: #f39c12;
      --danger: #e74c3c;
      --control-bg: rgba(0, 0, 0, 0.35);
      --control-text: #fefefe;
      --control-hover: rgba(255, 255, 255, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body.blackboard {
      font-family: 'Noto Serif SC', serif;
      background: var(--chalkboard-bg);
      color: var(--chalk-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #statusIndicator {
      position: fixed;
      top: 12px;
      right: 16px;
      background: rgba(0, 0, 0, 0.45);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      z-index: 1000;
      transition: background 0.3s ease;
    }

    .avatar-container {
      position: fixed;
      top: 50%;
      left: 10%;
      width: 320px;
      height: 540px;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      pointer-events: none;
    }

    .avatar-container .wrapper {
      width: 100%;
      height: 100%;
      border-radius: 16px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(8px);
    }

    .slide-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 32px 48px 140px;
      position: relative;
      gap: 12px;
    }

    .slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: calc(100% - 8px);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.4s ease, visibility 0.4s ease;
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 16px 20px;
    }

    .slide.active {
      opacity: 1;
      visibility: visible;
    }

    .slide-content {
      display: flex;
      flex: 1;
      gap: 24px;
      max-width: 1440px;
    }

    .blackboard-text {
      flex: 1 1 50%;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 18px;
      padding: 24px 28px;
      box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.35);
      overflow-y: auto;
    }

    .blackboard-text h1,
    .blackboard-text h2 {
      color: var(--highlight);
      margin-bottom: 12px;
      text-shadow: 0 0 6px rgba(241, 196, 15, 0.45);
    }

    .blackboard-text ul {
      margin-left: 1.2rem;
      line-height: 1.7;
    }

    .blackboard-text li {
      margin-bottom: 0.45rem;
    }

    .animation-pane {
      flex: 1 1 50%;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 18px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      box-shadow: inset 0 0 16px rgba(0, 0, 0, 0.3);
    }

    .animation-pane h3 {
      color: var(--accent);
      margin-bottom: 16px;
      font-size: 1.15rem;
      letter-spacing: 0.08em;
    }

    .animation-canvas-wrapper {
      flex: 1;
      border-radius: 16px;
      border: 1px solid rgba(241, 196, 15, 0.35);
      background: radial-gradient(circle at top, rgba(46, 204, 113, 0.12), rgba(10, 24, 48, 0.65));
      position: relative;
      overflow: hidden;
      min-height: 260px;
    }

    .animation-canvas-wrapper canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .animation-notes {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 0.95rem;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.85);
      overflow-y: auto;
      max-height: 220px;
    }

    .animation-notes ul {
      margin-left: 1.15rem;
    }

    .animation-notes li {
      margin-bottom: 0.45rem;
    }

    .subtitle-area {
      position: fixed;
      bottom: 92px;
      left: 50%;
      transform: translateX(-50%);
      min-height: 64px;
      min-width: 60%;
      max-width: 80%;
      padding: 12px 24px;
      background: rgba(0, 0, 0, 0.55);
      border-radius: 12px;
      text-align: center;
      font-size: 1.05rem;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 900;
    }

    .subtitle-area[aria-live="polite"] {
      outline: none;
    }

    .control-bar {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--control-bg);
      padding: 16px 28px;
      border-radius: 999px;
      display: flex;
      gap: 12px;
      align-items: center;
      backdrop-filter: blur(8px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
    }

    .control-bar button {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.35);
      color: var(--control-text);
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .control-bar button:hover:not([disabled]) {
      background: var(--control-hover);
      transform: translateY(-1px);
    }

    .control-bar button[disabled] {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .meta-bar {
      position: fixed;
      top: 18px;
      left: 24px;
      max-width: 40%;
      background: rgba(0, 0, 0, 0.35);
      padding: 12px 16px;
      border-radius: 14px;
      line-height: 1.5;
      font-size: 0.95rem;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
    }

    .meta-bar strong {
      color: var(--highlight);
    }

    @media (max-width: 1200px) {
      .slide-content {
        flex-direction: column;
      }

      .avatar-container {
        display: none;
      }
    }
  </style>

            await maybePlayer;

        }

        if (typeof platform.start === 'function') {
          try {

            if (maybeStart && typeof maybeStart.then === 'function') {

          } catch (startError) {

        indicator.textContent = '虚拟人未连接';
        indicator.style.background = 'rgba(231, 76, 60, 0.55)';
        throw error;
      }
    }

    window.avatarReadyPromise = initAvatarPlatform();

  <script>
    const videoMeta = {"identifier": "3.1", "title": "导数的核心概念与几何意义", "chapterTitle": "第三章：导数与微分 (洞察瞬时变化)"};

    "animationHTML": "<p>1. 对比割线斜率与切线斜率，出现“并不相同”的提示框。</p>\n<p>2. 图像展示 $|x|$ 在原点的尖点，闪烁“不可导”标签。</p>",
    "speak": "切记导数需要极限存在。比如绝对值函数在原点有尖点，没有唯一的切线斜率，因此不可导。把这些易错点记在笔记上。",

];

    window.avatarReadyPromise = window.avatarReadyPromise || Promise.resolve(null);

    const slideContainer = document.getElementById('slide-container');
    const subtitleArea = document.getElementById('subtitleArea');
    const statusIndicator = document.getElementById('statusIndicator');
    const autoBtn = document.getElementById('autoBtn');

    let currentIndex = -1;
    let autoPlaying = false;
    let autoPlayToken = 0;

    function buildSlides() {
      slideContainer.innerHTML = '';
      slidesSpec.forEach((slide, idx) => {
        const slideEl = document.createElement('div');
        slideEl.className = 'slide';

        const content = document.createElement('div');
        content.className = 'slide-content';

        const board = document.createElement('div');
        board.className = 'blackboard-text';
        const boardTitle = '<h2>第' + slide.page + '页 · ' + slide.title + '</h2>';
        board.innerHTML = boardTitle + (slide.boardHTML || '<p>本页暂无板书内容。</p>');

        const animationPane = document.createElement('div');
        animationPane.className = 'animation-pane';

        const animationTitle = document.createElement('h3');
        animationTitle.textContent = '动画演示';
        animationPane.appendChild(animationTitle);

        const canvasWrapper = document.createElement('div');
        canvasWrapper.className = 'animation-canvas-wrapper';

        const canvas = document.createElement('canvas');
        canvas.className = 'animationCanvas';
        canvas.dataset.slideIndex = String(idx);
        canvas.setAttribute('aria-label', '第' + slide.page + '页动画演示');
        canvasWrapper.appendChild(canvas);
        animationPane.appendChild(canvasWrapper);

        const notes = document.createElement('div');
        notes.className = 'animation-notes';
        notes.innerHTML = slide.animationHTML || '<p>参照蓝图补充动画。</p>';
        animationPane.appendChild(notes);

        content.appendChild(board);
        content.appendChild(animationPane);
        slideEl.appendChild(content);
        slideContainer.appendChild(slideEl);
      });
    }

    function getSlides() {
      return Array.from(document.querySelectorAll('.slide'));
    }

    function switchToSlide(index) {
      const slides = getSlides();
      if (index < 0 || index >= slides.length) {
        return;
      }

      const previous = currentIndex;
      if (previous !== -1) {
        const previousSlide = slides[previous];
        if (previousSlide) {
          previousSlide.classList.remove('active');
        }
        stopAnimationFor(previous);
      }

      const targetSlide = slides[index];
      if (targetSlide) {
        targetSlide.classList.add('active');
      }
      currentIndex = index;
      subtitleArea.textContent = slidesSpec[currentIndex]?.speak || '';
      startAnimationFor(currentIndex);
    }

    function wait(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    async function ensureAvatarReady() {
      try {
        const platform = await window.avatarReadyPromise;
        return platform || null;
      } catch (error) {
        console.warn('虚拟人未就绪', error);
        return null;
      }
    }

    async function speakContent(slide) {
      if (!slide) {
        return;
      }
      subtitleArea.textContent = slide.speak || '';

      const platform = await ensureAvatarReady();
      if (!platform) {
        return;
      }

      try {
        if (Array.isArray(slide.actions)) {
          for (const action of slide.actions) {
            if (typeof platform.writeCmd === 'function') {
              try {
                const maybeAction = platform.writeCmd('action', action);
                if (maybeAction && typeof maybeAction.then === 'function') {
                  await maybeAction;
                }
              } catch (err) {
                console.warn('动作执行失败', action, err);
              }
            }
          }
        }

        if (slide.speak && typeof platform.writeText === 'function') {
          const textResult = platform.writeText(slide.speak, { nlp: false });
          if (textResult && typeof textResult.then === 'function') {
            await textResult;
          }
        }
      } catch (error) {
        console.warn('虚拟人交互失败', error);
        statusIndicator.textContent = '虚拟人未连接';
        statusIndicator.style.background = 'rgba(231, 76, 60, 0.55)';
      }
    }

    async function startAutoPlay() {
      if (autoPlaying) {
        return;
      }
      autoPlaying = true;
      autoPlayToken += 1;
      const token = autoPlayToken;
      setControlsDisabled(true);
      autoBtn.textContent = '停止自动播放';

      let startIndex = currentIndex;
      if (startIndex < 0) {
        startIndex = 0;
      }

      for (let i = startIndex; i < slidesSpec.length; i += 1) {
        if (!autoPlaying || token !== autoPlayToken) {
          break;
        }
        switchToSlide(i);
        await speakContent(slidesSpec[i]);
        const duration = slidesSpec[i]?.durationMs ?? 5000;
        const safeDuration = Number.isFinite(duration) ? duration : 5000;
        await wait(safeDuration);
      }

      if (token === autoPlayToken) {
        autoPlaying = false;
        setControlsDisabled(false);
        autoBtn.textContent = '自动播放';
      }
    }

    function stopAutoPlay() {
      if (!autoPlaying) {
        return;
      }
      autoPlaying = false;
      autoPlayToken += 1;
      setControlsDisabled(false);
      autoBtn.textContent = '自动播放';
    }

    function setControlsDisabled(disabled) {
      document.querySelectorAll('.control-bar button').forEach((btn) => {
        if (btn.id === 'autoBtn') {
          return;
        }
        btn.disabled = disabled;
      });
    }

    document.getElementById('prevBtn').addEventListener('click', () => {
      stopAutoPlay();
      const target = currentIndex <= 0 ? 0 : currentIndex - 1;
      switchToSlide(target);
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
      stopAutoPlay();
      const target = currentIndex < slidesSpec.length - 1 ? currentIndex + 1 : slidesSpec.length - 1;
      switchToSlide(target);
    });

    document.getElementById('restartBtn').addEventListener('click', () => {
      stopAutoPlay();
      switchToSlide(0);
    });

    document.getElementById('playBtn').addEventListener('click', async () => {
      stopAutoPlay();
      if (currentIndex === -1) {
        switchToSlide(0);
      }
      await speakContent(slidesSpec[currentIndex]);
    });

    autoBtn.addEventListener('click', () => {
      if (autoPlaying) {
        stopAutoPlay();
      } else {
        startAutoPlay();
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'ArrowRight' || event.key === ' ') {
        document.getElementById('nextBtn').click();
      } else if (event.key === 'ArrowLeft') {
        document.getElementById('prevBtn').click();
      } else if (event.key === 'Enter') {
        document.getElementById('playBtn').click();
      } else if (event.key === 'Escape') {
        stopAutoPlay();
      }
    });

    function startAnimationFor(index) {
      const selector = '.animationCanvas[data-slide-index="' + index + '"]';
      const canvas = document.querySelector(selector);
      if (!canvas) {
        return;
      }

      if (index === 0) {
        startAnimation0(canvas);
        return;
      }

      else if (index === 1) {
        startAnimation1(canvas);
        return;
      }

      else if (index === 2) {
        startAnimation2(canvas);
        return;
      }

      else if (index === 3) {
        startAnimation3(canvas);
        return;
      }

      else if (index === 4) {
        startAnimation4(canvas);
        return;
      }

      else if (index === 5) {
        startAnimation5(canvas);
        return;
      }

      if (canvas) {
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width || canvas.clientWidth || 0, canvas.height || canvas.clientHeight || 0);
      }

    }

    function stopAnimationFor(index) {

      if (index === 0) {
        stopAnimation0();
        return;
      }

      else if (index === 1) {
        stopAnimation1();
        return;
      }

      else if (index === 2) {
        stopAnimation2();
        return;
      }

      else if (index === 3) {
        stopAnimation3();
        return;
      }

      else if (index === 4) {
        stopAnimation4();
        return;
      }

      else if (index === 5) {
        stopAnimation5();
        return;
      }

      return;

    }

        if (!animationState5) return;
        if (animationState5.start === null) {
          animationState5.start = timestamp;
        }
        const elapsed = (timestamp - animationState5.start) / 1000;
        const { ctx } = animationState5.state;
        const width = animationState5.state.width;
        const height = animationState5.state.height;
        ctx.clearRect(0, 0, width, height);
        paintChalkboard(ctx, width, height);

        const margin = Math.min(width, height) * 0.12;
        const plotWidth = width * 0.68;
        const plotHeight = height * 0.7;
        const xMin = -2.5;
        const xMax = 2.5;
        const yMax = 4;
        const mapX = (x) => margin + ((x - xMin) / (xMax - xMin)) * plotWidth;
        const mapY = (y) => margin + plotHeight - (y / yMax) * plotHeight;

        drawAxes(ctx, mapX, mapY, [xMin, xMax], [0, yMax]);

        ctx.save();
        ctx.strokeStyle = '#f1c40f';
        ctx.lineWidth = 3;
        ctx.beginPath();
        for (let x = xMin; x <= xMax; x += 0.02) {
          const y = Math.abs(x) * 1.2 + 0.2;
          const px = mapX(x);
          const py = mapY(y);
          if (x === xMin) {
            ctx.moveTo(px, py);
          } else {
            ctx.lineTo(px, py);
          }
        }
        ctx.stroke();
        ctx.restore();

        const qx = 1.8 * Math.sin(elapsed * 0.6);
        const qy = Math.abs(qx) * 1.2 + 0.2;
        const qpx = mapX(qx);
        const qpy = mapY(qy);
        ctx.save();
        ctx.fillStyle = '#ec7063';
        ctx.beginPath();
        ctx.arc(qpx, qpy, 7, 0, TWO_PI);
        ctx.fill();
        ctx.restore();

        const leftSlope = -1.2;
        const rightSlope = 1.2;
        ctx.save();
        ctx.setLineDash([12, 10]);
        ctx.strokeStyle = '#ec7063';
        ctx.lineWidth = 2.2;
        ctx.beginPath();
        ctx.moveTo(mapX(xMin), mapY(Math.abs(xMin) * 1.2 + 0.2));
        ctx.lineTo(mapX(0), mapY(0.2));
        ctx.lineTo(mapX(xMax), mapY(Math.abs(xMax) * 1.2 + 0.2));
        ctx.stroke();
        ctx.restore();

        ctx.save();
        ctx.strokeStyle = '#58d68d';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(mapX(xMin), mapY(0.2 + leftSlope * (xMin)));
        ctx.lineTo(mapX(0), mapY(0.2));
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(mapX(0), mapY(0.2));
        ctx.lineTo(mapX(xMax), mapY(0.2 + rightSlope * (xMax)));
        ctx.stroke();
        ctx.restore();

        drawTextLabel(ctx, '左侧斜率 → -1.2', width * 0.8, margin + 40, { align: 'center', size: 18 });
        drawTextLabel(ctx, '右侧斜率 → +1.2', width * 0.8, margin + 72, { align: 'center', size: 18 });
        drawTextLabel(ctx, '尖点处切线不存在 → 函数不可导', width * 0.78, margin + 120, { align: 'center', size: 20 });

        animationHandle5 = requestAnimationFrame(drawFrame);
      }

      animationHandle5 = requestAnimationFrame(drawFrame);
      resizeListener5 = () => {
        if (!animationState5) return;
        animationState5.state.resize();
      };
      window.addEventListener('resize', resizeListener5);
    }

    function stopAnimation5() {
      if (animationHandle5 !== null) {
        cancelAnimationFrame(animationHandle5);
        animationHandle5 = null;
      }
      if (resizeListener5) {
        window.removeEventListener('resize', resizeListener5);
        resizeListener5 = null;
      }
      animationState5 = null;
    }
    buildSlides();
    switchToSlide(0);
  </script>
</body>
