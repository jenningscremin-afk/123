<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极限求解：因式分解法</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Serif SC', serif;
            background: #1a1a2e;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        .blackboard {
            width: 100vw;
            height: 100vh;
            background: #1a1a2e;
            position: relative;
            border: 10px solid #795548;
            margin: 0;
        }
        .avatar-container {
            position: fixed;
            top: 60%; left: 50%;
            transform: translate(-50%, -50%);
            width: 750px; height: 850px;
            overflow: hidden; z-index: 50;
            pointer-events: none; background: transparent;
            border: none; box-shadow: none;
        }
        .wrapper {
            width: 100%; height: 100%;
            background: transparent; pointer-events: auto;
        }
        .content-area {
            position: absolute;
            top: 20px; left: 50px; right: 50px; bottom: 120px;
            z-index: 10; overflow: hidden;
        }
        .page {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            opacity: 0; visibility: hidden;
            transition: all 0.7s ease-in-out;
            padding: 20px;
            display: grid;
            grid-template-columns: 2fr 3fr;
            gap: 30px;
            align-items: center;
        }
        .page.active {
            opacity: 1; visibility: visible;
        }
        .chalk-text {
            color: #ffffff;
            font-family: 'Noto Serif SC', serif;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .page-title {
            font-size: 1.8rem; font-weight: bold;
            color: #e1bee7; margin-bottom: 1.2rem;
        }
        .text-medium {
            font-size: 1rem; margin-bottom: 0.6rem;
            line-height: 1.6; color: #f3e5f5; font-weight: 500;
        }
        .text-medium p {
            margin-bottom: 1.2rem;
        }
        .text-medium strong {
            color: #81c784;
            font-weight: 600;
        }
        .graph-container {
            background: transparent;
            border: none;
            padding: 10px;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            overflow: visible;
            min-height: 400px;
        }
        .subtitle-area {
            position: absolute;
            bottom: 20px; left: 50px; right: 50px;
            height: 50px; background: rgba(0,0,0,0.8);
            border-radius: 8px; display: flex;
            align-items: center; justify-content: center;
            z-index: 60; color: white;
            font-size: 0.9rem; text-align: center;
            padding: 0 20px; line-height: 1.4;
        }
        .control-bar {
            position: fixed; left: -220px; top: 50%;
            transform: translateY(-50%); width: 250px;
            background: rgba(30,30,30,0.95);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 10px; z-index: 200;
            border-radius: 0 15px 15px 0;
            padding: 20px 15px; transition: left 0.3s ease;
        }
        .control-bar:hover { left: 0; }
        .control-bar::before {
            content: '▶️'; position: absolute;
            top: 50%; right: -25px;
            transform: translateY(-50%);
            background: rgba(30,30,30,0.95);
            padding: 10px 5px; border-radius: 0 10px 10px 0;
            font-size: 0.8rem; writing-mode: vertical-lr;
        }
        .btn {
            padding: 12px 20px; background: linear-gradient(135deg, #4a4a4a, #666);
            color: white; border: none; border-radius: 8px;
            cursor: pointer; font-size: 13px; font-weight: bold;
            transition: all 0.3s ease; width: 100%; text-align: center;
        }
        .btn:hover { background: linear-gradient(135deg, #555, #777); transform: translateY(-2px); }
        .btn.primary { background: linear-gradient(135deg, #FF69B4, #FF1493); }
        
        /* 统一将图中元素改为白色 */
        .graph-container svg .axis path,
        .graph-container svg .axis line {
            stroke: #ffffff !important;
            stroke-width: 2;
        }
        .graph-container svg .axis text {
            fill: #ffffff !important;
            font-size: 16px;
            font-weight: 500;
        }
        .graph-container svg .label {
            fill: #ffffff !important;
            font-size: 20px;
            font-weight: 600;
        }
        .graph-container svg .grid-line {
            stroke: #ffffff !important;
            stroke-width: 0.5;
            stroke-opacity: 0.3;
        }

        /* 连接状态指示器 */
        .status-indicator {
            position: absolute;
            top: 10px; right: 10px;
            padding: 5px 10px;
            background: rgba(0,0,0,0.5);
            color: white; border-radius: 5px;
            font-size: 12px; z-index: 100;
            transition: opacity 0.3s ease;
        }
        .status-indicator.connected { background: rgba(76, 175, 80, 0.8); }
        .status-indicator.error { background: rgba(244, 67, 54, 0.8); }
        .status-indicator.connecting { background: rgba(255, 152, 0, 0.8); }

        /* 录制模式下隐藏状态指示器和控制栏 */
        .recording-mode .status-indicator {
            opacity: 0; pointer-events: none;
        }
        .recording-mode .control-bar {
            left: -300px; transition: left 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="blackboard">
        <div id="statusIndicator" class="status-indicator">等待连接</div>
        
        <div class="avatar-container">
            <div class="wrapper" id="avatarWrapper"></div>
        </div>

        <div class="content-area" id="contentArea">
            <!-- Pages will be dynamically generated here -->
        </div>

        <div class="subtitle-area" id="subtitleArea">
            欢迎学习极限求解：因式分解法！点击"开始讲课"启动虚拟人讲师。
        </div>

        <div class="control-bar">
            <div style="color: white; margin-bottom: 1rem; text-align: center; font-size: 12px;">
                第 <span id="currentPage">1</span> 页 / 共 <span id="totalPages">6</span> 页
            </div>
            <div id="connectionStatus" style="color: #ffab40; margin-bottom: 1rem; text-align: center; font-size: 11px;">
                虚拟人未连接
            </div>
            <button class="btn" onclick="previousPage()">⬅️ 上一页</button>
            <button class="btn primary" onclick="startTeaching()" id="startBtn">🎀 开始讲课</button>
            <button class="btn" onclick="nextPage()">下一页 ➡️</button>
            <button class="btn" onclick="restart()">🔄 重新开始</button>
            <button class="btn" onclick="startAutoPlay()" id="autoPlayBtn" style="background: linear-gradient(135deg, #2196f3, #1976d2);">🎬 自动播放</button>
            <div style="color: #ffab40; margin-top: 0.5rem; text-align: center; font-size: 10px; line-height: 1.2;">
                💡 录制提示：<br>
                点击自动播放后立即开始录屏<br>
                系统会自动完成全部演示
            </div>
        </div>
    </div>

    <script>
        window.MathJax = {
            tex: { 
                inlineMath: [['$', '$'], ['\\(', '\\)']], 
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                packages: ['base', 'ams']
            },
            startup: { 
                pageReady: () => { 
                    console.log('MathJax is ready.'); 
                    return MathJax.startup.defaultPageReady(); 
                } 
            },
            options: {
                processHtmlClass: 'tex2jax_process',
                ignoreHtmlClass: 'tex2jax_ignore'
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- 讯飞官方SDK - 按照成功案例的加载方式 -->
    <script type="module">
        try {
            // 根据成功案例，导入讯飞官方SDK
            const { default: AvatarPlatform, SDKEvents, PlayerEvents, RecorderEvents, UserMedia } = await import('./avatar-sdk-web_3.1.2.1002/index.js');

            // 挂载到全局对象
            window.AvatarPlatform = AvatarPlatform;
            window.SDKEvents = SDKEvents;
            window.PlayerEvents = PlayerEvents;
            window.RecorderEvents = RecorderEvents;
            window.UserMedia = UserMedia;

            console.log('✅ 讯飞官方SDK模块已加载');
            console.log('SDK版本:', AvatarPlatform.getVersion());

        } catch (error) {
            console.error('❌ SDK模块加载失败:', error);
            // 降级处理：创建模拟的AvatarPlatform
            window.AvatarPlatform = class {
                constructor(options) {
                    this.events = {};
                    this.options = options;
                    console.log("模拟SDK已初始化");
                }
                on(event, callback) {
                    this.events[event] = callback;
                    return this;
                }
                setApiInfo(info) {
                    this.apiInfo = info;
                    console.log("API Info set:", info);
                }
                setGlobalParams(params) {
                    this.globalParams = params;
                    console.log("Global Params set:", params);
                }
                async start(config) {
                    console.log("模拟启动虚拟人");
                    setTimeout(() => {
                        this.events.connected?.({ message: "模拟连接成功" });
                    }, 1000);
                }
                async writeText(text, options) {
                    console.log("模拟播放文本:", text);
                    return Promise.resolve();
                }
                async writeCmd(type, actionId) {
                    console.log(`模拟执行动作: ${type} - ${actionId}`);
                    return Promise.resolve();
                }
                stop() {
                    console.log("模拟停止虚拟人");
                }
                destroy() {
                    console.log("模拟销毁虚拟人");
                }
                static getVersion() {
                    return "模拟版本 1.0.0";
                }
            };
        }

        // 触发自定义事件，通知SDK已准备就绪
        window.dispatchEvent(new CustomEvent('sdkReady'));
    </script>

    <script>
        let avatarPlatform = null;
        let isConnected = false;
        let isTeaching = false;
        let currentPage = 1;
        const totalPages = 6;

        const boardContent = [
            { 
                title: "求解极限：因式分解法", 
                text: "<p>我们今天要解决的问题是：</p><p>求 <div class='tex2jax_process'>$\\lim\\limits_{x \\to 2} \\frac{x^2 - 4}{x - 2}$</div></p><p>这是一个<strong>分式极限</strong>的典型例题。</p>" 
            },
            { 
                title: "第一步：直接代入", 
                text: "<p>首先，我们尝试将 $x=2$ 直接代入表达式中。</p><p>$\\frac{2^2 - 4}{2 - 2} = \\frac{4 - 4}{2 - 2} = \\frac{0}{0}$</p><p><strong>这是一个\"0/0\"型未定式，无法直接得出结果。</strong></p>" 
            },
            { 
                title: "第二步：因式分解", 
                text: "<p>对于\"0/0\"型，我们尝试对分子进行<strong>因式分解</strong>。</p><p>利用平方差公式：</p><p>$x^2 - 4 = (x-2)(x+2)$</p><p>这样我们就能找到分子分母的<strong>公因式</strong>。</p>" 
            },
            { 
                title: "第三步：约去公因式", 
                text: "<p>将分解后的式子代回原极限：</p><p><div class='tex2jax_process'>$\\lim\\limits_{x \\to 2} \\frac{(x-2)(x+2)}{x-2}$</div></p><p>因为 $x \\to 2$ 但 $x \\neq 2$，所以 $(x-2)$ 不为零，可以<strong>约分</strong>。</p>" 
            },
            { 
                title: "第四步：再次代入", 
                text: "<p>约分后，极限问题简化为：</p><p><div class='tex2jax_process'>$\\lim\\limits_{x \\to 2} (x+2)$</div></p><p>现在，我们可以再次进行直接代入：</p><p>$2+2=4$</p>" 
            },
            { 
                title: "第五步：得出结论", 
                text: "<p>我们通过因式分解和约分，最终得到了一个确定的数值 4。</p><p><strong>最终答案：</strong></p><p><div class='tex2jax_process'>$\\lim\\limits_{x \\to 2} \\frac{x^2 - 4}{x - 2} = 4$</div></p>" 
            }
        ];

        const subtitleScript = {
            1: "同学们好，今天我们来学习一种求解极限的重要方法——因式分解法。我们将通过求解这个分式极限的例题来掌握它。",
            2: "求解极限的第一步，总是尝试直接代入。我们把 x 等于 2 代入，会发现分子是 4 减 4 等于 0，分母是 2 减 2 等于 0。这就得到了 0 除以 0 的形式，这是一个未定式，说明我们需要用更巧妙的方法。",
            3: "面对 0/0 型未定式，因式分解是我们的有力武器。观察分子 x 的平方减 4，我们可以利用平方差公式，将它分解为 x 减 2 乘以 x 加 2。这样就能找到分子分母的公因式。",
            4: "现在，我们将分解后的式子代回原极限。大家看，分子和分母都出现了公因式 x 减 2。因为求极限的过程中，x 只是无限趋近于2，但永远不等于2，所以 x 减 2 这个因子不为零，我们可以安全地将它约去。",
            5: "约去公因式后，原来复杂的分式极限，就简化成了一个非常简单的整式极限：求 x 加 2 的极限。现在，我们可以再次使用直接代入法，将 x 等于 2 代入，得到 2 加 2 等于 4。",
            6: "通过因式分解、约分和再次代入，我们最终得到了一个确定的数值4。所以，这道题的最终答案就是4。这就是因式分解法解决未定式极限的完整过程。"
        };
        
        const autoPlayDurations = {
            1: 12000,  // 95字，问题介绍和方法概述 - 12秒
            2: 23000,  // 125字，直接代入发现未定式 - 18秒
            3: 15000,  // 85字，因式分解步骤 - 15秒
            4: 20000,  // 135字，约去公因式详解 - 20秒
            5: 19000,  // 90字，再次代入计算 - 12秒
            6: 8000    // 65字，得出最终结论 - 8秒
        };

        // 状态更新函数
        function updateStatus(message, type = 'normal') {
            const indicator = document.getElementById('statusIndicator');
            const connectionStatus = document.getElementById('connectionStatus');
            
            if (indicator) {
                indicator.textContent = message;
                indicator.className = 'status-indicator';
                if (type === 'connected') {
                    indicator.classList.add('connected');
                } else if (type === 'error') {
                    indicator.classList.add('error');
                } else if (type === 'connecting') {
                    indicator.classList.add('connecting');
                }
            }
            
            if (connectionStatus) {
                connectionStatus.textContent = message;
                connectionStatus.style.color = type === 'connected' ? '#81c784' : 
                                              type === 'error' ? '#f44336' : '#ffab40';
            }
        }

        // 等待SDK加载完成
        function waitForSDK() {
            return new Promise((resolve, reject) => {
                if (typeof AvatarPlatform !== 'undefined') {
                    resolve();
                    return;
                }
                
                const timeout = setTimeout(() => {
                    reject(new Error('SDK加载超时，请刷新页面重试'));
                }, 10000);
                
                window.addEventListener('sdkReady', function handler() {
                    clearTimeout(timeout);
                    window.removeEventListener('sdkReady', handler);
                    resolve();
                });
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const contentArea = document.getElementById('contentArea');
            boardContent.forEach((content, i) => {
                const page = document.createElement('div');
                page.className = 'page';
                page.dataset.page = i + 1;
                page.innerHTML = `
                    <div class="chalk-text">
                        <div class="page-title">${content.title}</div>
                        <div class="text-medium">${content.text}</div>
                    </div>
                    <div class="graph-container">
                        <svg id="viz-${i+1}" width="100%" height="100%"></svg>
                    </div>
                `;
                contentArea.appendChild(page);
            });
            
            // 设置总页数
            document.getElementById('totalPages').textContent = totalPages;
            switchToPage(1, false);
            console.log('✨ 因式分解法教学系统初始化完成');
        });

        function switchToPage(pageNum, shouldSpeak = true) {
            if (pageNum < 1 || pageNum > totalPages) return;
            currentPage = pageNum;
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelector(`[data-page="${pageNum}"]`).classList.add('active');
            updatePageInfo();
            
            setTimeout(() => {
                drawPageGraph(pageNum);
                if(window.MathJax && window.MathJax.typeset) {
                    window.MathJax.typeset();
                }
            }, 50);

            if (shouldSpeak && !isAutoPlaying) {
                speakContent(pageNum);
            }
        }

        // 静默页面切换 - 不播放语音，专用于自动播放
        function switchToPageSilent(pageNum) {
            if (pageNum < 1 || pageNum > totalPages) {
                console.log(`❌ 页面切换失败：页码${pageNum}超出范围(1-${totalPages})`);
                return;
            }

            console.log(`🔄 开始切换到第${pageNum}页...`);

            const allPages = document.querySelectorAll('.page');
            allPages.forEach(page => page.classList.remove('active'));

            const targetPage = document.querySelector(`[data-page="${pageNum}"]`);
            if (targetPage) {
                targetPage.classList.add('active');
                currentPage = pageNum;
                updatePageInfo();
                console.log(`✅ 成功切换到第${pageNum}页`);

                targetPage.offsetHeight; // 触发重绘

                setTimeout(() => {
                    drawPageGraph(pageNum);
                    console.log(`🎨 第${pageNum}页图像绘制完成`);
                }, 300);
            } else {
                console.log(`❌ 未找到第${pageNum}页的DOM元素`);
            }
        }
        
        function drawPageGraph(pageNum) {
            const svg = d3.select(`#viz-${pageNum}`);
            svg.selectAll("*").remove(); 

            const container = svg.node().parentNode;
            const width = Math.max(container.clientWidth - 40, 320);
            const height = Math.max(container.clientHeight - 40, 220);
            svg.attr('viewBox', `0 0 ${width} ${height}`)
               .attr('preserveAspectRatio', 'xMidYMid meet');

            switch(pageNum) {
                case 1: drawIntroGraph(svg, width, height); break;
                case 2: drawSubstitutionGraph(svg, width, height); break;
                case 3: drawFactorizationGraph(svg, width, height); break;
                case 4: drawCancellationGraph(svg, width, height); break;
                case 5: drawFinalSubstitutionGraph(svg, width, height); break;
                case 6: drawConclusionGraph(svg, width, height); break;
            }
        }
        
        function drawIntroGraph(svg, width, height) {
            // 增大字体尺寸但保证不会溢出
            const fontSize = Math.min(width * 0.09, height * 0.12, 48);
            const fracFontSize = Math.min(width * 0.065, height * 0.1, 36);
            const spacing = Math.min(width * 0.18, 100);

            // 创建渐变
            const gradient = svg.append("defs").append("linearGradient")
                .attr("id", "grad1")
                .attr("x1", "0%").attr("y1", "0%")
                .attr("x2", "100%").attr("y2", "0%");
            gradient.append("stop").attr("offset", "0%").style("stop-color", "#e1bee7");
            gradient.append("stop").attr("offset", "100%").style("stop-color", "#81c784");

            // lim文本 - 合理调整位置
            const limText = svg.append("text")
                .attr("x", width / 2 - spacing * 1.1)
                .attr("y", height / 2 - 10)
                .attr("text-anchor", "middle")
                .attr("font-size", fontSize + "px")
                .attr("font-weight", "bold")
                .attr("fill", "url(#grad1)")
                .text("lim");

            // x→2下标 - 加大字体
            const subscript = svg.append("text")
                .attr("x", width / 2 - spacing * 1.1)
                .attr("y", height / 2 + fontSize * 0.65)
                .attr("text-anchor", "middle")
                .attr("font-size", fontSize * 0.65 + "px")
                .attr("fill", "#ffab40")
                .text("x→2");

            // 分数部分 - 加大尺寸并调整位置
            const fracGroup = svg.append("g").attr("transform", `translate(${width / 2 + spacing * 0.15}, ${height / 2})`);

            // 分子 - 加大字体
            const numerator = fracGroup.append("text")
                .attr("x", 0)
                .attr("y", -fracFontSize * 0.45)
                .attr("text-anchor", "middle")
                .attr("font-size", fracFontSize + "px")
                .attr("fill", "white")
                .text("x² - 4");

            // 分母 - 加大字体
            const denominator = fracGroup.append("text")
                .attr("x", 0)
                .attr("y", fracFontSize * 0.85)
                .attr("text-anchor", "middle")
                .attr("font-size", fracFontSize + "px")
                .attr("fill", "white")
                .text("x - 2");

            // 分数线 - 加长并加粗
            const fracLine = fracGroup.append("line")
                .attr("x1", -fracFontSize * 1.2)
                .attr("y1", 0)
                .attr("x2", fracFontSize * 1.2)
                .attr("y2", 0)
                .attr("stroke", "white")
                .attr("stroke-width", 3);

            // 添加动画
            svg.selectAll("text, line").attr("opacity", 0).transition().duration(1000).attr("opacity", 1);
        }

        function drawSubstitutionGraph(svg, width, height) {
            const g = svg.append("g").attr("transform", `translate(${width/2}, ${height/2})`);
            // 加大字体尺寸
            const fontSize = Math.min(width * 0.08, height * 0.1, 48);
            const spacing = Math.min(width * 0.22, 140);
            
            const num2 = g.append("text").text("2").attr("x", -spacing).attr("y", -90).attr("font-size", fontSize + "px").attr("fill", "#ffab40");
            const frac = g.append("text").attr("font-size", fontSize + "px").attr("fill", "white").attr("text-anchor", "middle");
            
            // 分子 - 加大字体
            frac.append("tspan").attr("x", 0).attr("dy", "-0.7em").text("x² - 4");
            // 分母 - 加大字体
            frac.append("tspan").attr("x", 0).attr("dy", "1.4em").text("x - 2");
            
            // 分数线 - 加长加粗
            g.append("line").attr("x1", -100).attr("y1", 0).attr("x2", 100).attr("y2", 0).attr("stroke", "white").attr("stroke-width", 3);
            
            const result = g.append("text").attr("x", spacing * 0.9).attr("font-size", fontSize + "px").attr("fill", "#f87171").attr("text-anchor", "middle").attr("opacity", 0);

        function drawFactorizationGraph(svg, width, height) {
            const g = svg.append("g").attr("transform", `translate(${width/2}, ${height/2})`);
            // 加大字体尺寸
            const fontSize = Math.min(width * 0.08, height * 0.1, 48);
            const spacing = Math.min(width * 0.18, 120);

            const original = g.append("text").attr("font-size", fontSize + "px").attr("fill", "white").attr("text-anchor", "middle").text("x² - 4");
            const equals = g.append("text").attr("x", spacing * 0.9 - 80).attr("font-size", fontSize + "px").attr("fill", "white").attr("text-anchor", "middle").text("=").attr("opacity", 0);
            const factored = g.append("text").attr("x", spacing * 2.0 - 80).attr("font-size", fontSize + "px").attr("fill", "#81c784").attr("text-anchor", "middle").text("(x-2)(x+2)").attr("opacity", 0);

            original.transition().duration(1500).attr("x", -spacing * 0.9);
            equals.transition().delay(1000).duration(500).attr("opacity", 1);
            factored.transition().delay(1500).duration(1000).attr("opacity", 1);
        }

        function drawCancellationGraph(svg, width, height) {
            const g = svg.append("g").attr("transform", `translate(${width/2}, ${height/2})`);
            // 加大字体尺寸
            const fontSize = Math.min(width * 0.08, height * 0.1, 44);
            const spacing = Math.min(width * 0.18, 120);

            const frac = g.append("text").attr("transform", "translate(-100, 0)").attr("font-size", fontSize + "px").attr("fill", "white").attr("text-anchor", "middle");
            const num = frac.append("tspan").attr("x", 0).attr("dy", "-0.7em").text("(x-2)(x+2)");
            const den = frac.append("tspan").attr("x", 0).attr("dy", "1.4em").text("(x-2)");
            g.append("line").attr("x1", -spacing * 1.1 - 100).attr("y1", 0).attr("x2", spacing * 1.1 - 100).attr("y2", 0).attr("stroke", "white").attr("stroke-width", 3);

            const equals = g.append("text").attr("x", spacing * 1.3 - 80).attr("y", 0).attr("font-size", fontSize + "px").attr("fill", "white").attr("text-anchor", "middle").text("=").attr("opacity", 0);
            const simplified = g.append("text").attr("x", spacing * 1.7 - 40).attr("font-size", fontSize + "px").attr("fill", "#81c784").attr("text-anchor", "middle").text("(x+2)").attr("opacity", 0);
            
            setTimeout(() => {
                num.transition().duration(500).attr("fill", "#f87171");
                den.transition().duration(500).attr("fill", "#f87171");
            }, 1000);
            
            setTimeout(() => {
                equals.transition().duration(500).attr("opacity", 1);
                simplified.transition().delay(500).duration(1000).attr("opacity", 1);
            }, 2000);
        }

        function drawFinalSubstitutionGraph(svg, width, height) {
            const g = svg.append("g").attr("transform", `translate(${width/2}, ${height/2})`);
            // 加大字体尺寸
            const fontSize = Math.min(width * 0.09, height * 0.11, 52);
            const spacing = Math.min(width * 0.1, 50);
            
            const text1 = g.append("text").attr("x", -spacing - 100).attr("y", 0).text("(").attr("font-size", fontSize + "px").attr("fill", "white").attr("text-anchor", "middle");
            const textX = g.append("text").attr("x", -100).attr("y", 0).text("x").attr("font-size", fontSize + "px").attr("fill", "#ffab40").attr("text-anchor", "middle");
            const text2 = g.append("text").attr("x", spacing - 100).attr("y", 0).text("+2)").attr("font-size", fontSize + "px").attr("fill", "white").attr("text-anchor", "middle");
            
            const text3 = g.append("text").attr("x", -100).attr("y", 0).text("2").attr("font-size", fontSize + "px").attr("fill", "#81c784").attr("text-anchor", "middle").attr("opacity", 0);
            
            const equals = g.append("text").attr("x", spacing * 2 - 40).attr("y", 0).text("=").attr("font-size", fontSize + "px").attr("fill", "white").attr("text-anchor", "middle").attr("opacity", 0);
            
            const resultText = g.append("text").attr("x", spacing * 3 - 40).attr("y", 0).attr("font-size", Math.min(width * 0.1, height * 0.12, 60) + "px").attr("fill", "#e1bee7").attr("text-anchor", "middle");

            textX.transition().delay(1000).duration(1000)

            setTimeout(() => {
                equals.transition().duration(500).attr("opacity", 1);

        }

        function drawConclusionGraph(svg, width, height) {
            // 增大字体尺寸但保证不会溢出
            const fontSize = Math.min(width * 0.09, height * 0.12, 44);
            const fracFontSize = Math.min(width * 0.065, height * 0.1, 34);
            const spacing = Math.min(width * 0.14, 90);

            // 创建渐变
            const gradient = svg.append("defs").append("linearGradient")
                .attr("id", "grad6")
                .attr("x1", "0%").attr("y1", "0%")
                .attr("x2", "100%").attr("y2", "0%");
            gradient.append("stop").attr("offset", "0%").style("stop-color", "#e1bee7");
            gradient.append("stop").attr("offset", "100%").style("stop-color", "#81c784");

            // lim文本 - 调整位置以适应更大字体
            const limText = svg.append("text")
                .attr("x", width / 2 - spacing * 2.0)
                .attr("y", height / 2 - 10)
                .attr("text-anchor", "middle")
                .attr("font-size", fontSize + "px")
                .attr("font-weight", "bold")
                .attr("fill", "url(#grad6)")
                .text("lim");

            // x→2下标 - 加大字体
            const subscript = svg.append("text")
                .attr("x", width / 2 - spacing * 2.0)
                .attr("y", height / 2 + fontSize * 0.65)
                .attr("text-anchor", "middle")
                .attr("font-size", fontSize * 0.65 + "px")
                .attr("fill", "#ffab40")
                .text("x→2");

            // 分数部分 - 调整位置并加大尺寸
            const fracGroup = svg.append("g").attr("transform", `translate(${width / 2 - spacing * 0.4}, ${height / 2})`);

            // 分子 - 加大字体
            const numerator = fracGroup.append("text")
                .attr("x", 0)
                .attr("y", -fracFontSize * 0.45)
                .attr("text-anchor", "middle")
                .attr("font-size", fracFontSize + "px")
                .attr("fill", "white")
                .text("x² - 4");

            // 分母 - 加大字体
            const denominator = fracGroup.append("text")
                .attr("x", 0)
                .attr("y", fracFontSize * 0.85)
                .attr("text-anchor", "middle")
                .attr("font-size", fracFontSize + "px")
                .attr("fill", "white")
                .text("x - 2");

            // 分数线 - 加长并加粗
            const fracLine = fracGroup.append("line")
                .attr("x1", -fracFontSize * 1.2)
                .attr("y1", 0)
                .attr("x2", fracFontSize * 1.2)
                .attr("y2", 0)
                .attr("stroke", "white")
                .attr("stroke-width", 3);

            // 等号和结果 - 调整位置并加大字体
            const equalsText = svg.append("text")
                .attr("x", width / 2 + spacing * 1.2)
                .attr("y", height / 2)
                .attr("text-anchor", "middle")
                .attr("font-size", fontSize + "px")
                .attr("fill", "white")
                .text("= 4");

            // 添加动画
            const allElements = svg.selectAll("text, line");
            allElements.attr("transform", "scale(0.5)").attr("opacity", 0)
                .transition().duration(1500).ease(d3.easeElasticOut)
                .attr("transform", "scale(1)").attr("opacity", 1);
        }

        // 按照成功案例的动作执行方式
        async function performVirtualAction(actionId) {
            if (!isTeaching || !isConnected || !avatarPlatform) {
                console.log('⚠️ 虚拟人未连接，跳过动作执行');
                return;
            }

            try {
                await avatarPlatform.writeCmd("action", actionId);
                console.log(`✅ 执行动作: ${actionId}`);
            } catch (error) {
                console.error(`❌ 动作执行失败 (${actionId}):`, error);
            }
        }

        // 按照成功案例的动作映射
        function getActionsForPage(pageNum) {
            const actionMap = {
                1: 'A_RLH_welcome_O',
                2: 'A_LH_introduced_O',
                3: 'A_RH_please1_O',
                4: 'A_RLH_emphasize_O',
                5: 'A_U_No_pointing_O',
                6: 'A_U_No_pointing_O'
            };
            return actionMap[pageNum];
        }

        // 按照成功案例的语音播放方式
        async function speakContent(pageNum) {
            console.log(`🔍 检查播放条件: isTeaching=${isTeaching}, isConnected=${isConnected}, avatarPlatform=${!!avatarPlatform}`);
            
            if (!isTeaching || !isConnected || !avatarPlatform) {
                console.log('⚠️ 虚拟人未连接或未开始教学，跳过语音播报');
                return;
            }

            const content = subtitleScript[pageNum];
            if (!content) return;

            try {
                // 先执行动作
                const actionId = getActionsForPage(pageNum);
                if (actionId) {
                    await performVirtualAction(actionId);
                }

                // 然后播放语音内容
                await avatarPlatform.writeText(content, {
                    nlp: false
                });
                
                console.log(`✅ 虚拟人讲解第${pageNum}页，动作: ${actionId}`);

                // 更新字幕显示
                updateSubtitle(content);
            } catch (error) {
                console.error('❌ 虚拟人讲解失败:', error);
            }
        }

        // 更新字幕显示
        function updateSubtitle(text) {
            const subtitleArea = document.getElementById('subtitleArea');
            if (subtitleArea) {
                subtitleArea.textContent = text;
            }
        }

        // 页面控制函数 - 暴露到全局作用域
        window.nextPage = function() { 
            if (currentPage < totalPages) {
                switchToPage(currentPage + 1); 
            }
        };
        
        window.previousPage = function() { 
            if (currentPage > 1) {
                switchToPage(currentPage - 1); 
            }
        };
        
        window.restart = function() { 
            switchToPage(1); 
        };
        
        function updatePageInfo() { 
            document.getElementById('currentPage').textContent = currentPage; 
        }

        // 获取页面标题
        function getPageTitle(pageNum) {
            const titles = {
                1: "求解极限：因式分解法",
                2: "第一步：直接代入",
                3: "第二步：因式分解",
                4: "第三步：约去公因式",
                5: "第四步：再次代入",
                6: "第五步：得出结论"
            };
            return titles[pageNum] || `第${pageNum}页`;
        }

        // 自动播放功能 - 暴露到全局作用域
        let isAutoPlaying = false;
        window.startAutoPlay = async function() {
            if (isAutoPlaying) {
                stopAutoPlay();
                return;
            }

            try {
                console.log('🎬 开始自动播放完整课程...');
                isAutoPlaying = true;

                const autoPlayBtn = document.getElementById('autoPlayBtn');
                autoPlayBtn.textContent = '⏹️ 停止播放';
                autoPlayBtn.style.background = 'linear-gradient(135deg, #f44336, #d32f2f)';

                updateStatus(`🎬 自动播放将在 1 秒后开始，请准备录屏！`, 'connecting');
                await new Promise(resolve => setTimeout(resolve, 1000));

                updateStatus('🎬 自动播放开始！', 'connected');
                document.body.classList.add('recording-mode');

                // 如果虚拟人未连接，在后台尝试连接
                if (!isConnected) {
                    console.log('🎬 后台尝试连接虚拟人...');
                    startTeaching().catch(error => {
                        console.log('⚠️ 虚拟人连接失败，继续页面播放:', error);
                    });
                }

                // 逐页播放
                for (let page = 1; page <= totalPages; page++) {
                    try {
                        if (!isAutoPlaying) break;

                        console.log(`\n🎬 === 开始播放第${page}页/${totalPages}页 ===`);

                        switchToPageSilent(page);
                        updateStatus(`📖 第${page}页/${totalPages}页 - ${getPageTitle(page)}`, 'connected');

                        await new Promise(resolve => setTimeout(resolve, 800));

                        if (isConnected && isTeaching && avatarPlatform) {
                            console.log(`🎵 播放第${page}页语音...`);
                            try {
                                await speakContent(page);
                                const pageTime = autoPlayDurations[page];
                                await new Promise(resolve => setTimeout(resolve, pageTime));
                            } catch (error) {
                                console.error(`❌ 第${page}页语音播放失败:`, error);
                                const pageTime = autoPlayDurations[page];
                                await new Promise(resolve => setTimeout(resolve, pageTime));
                            }
                        } else {
                            const pageTime = autoPlayDurations[page];
                            await new Promise(resolve => setTimeout(resolve, pageTime));
                        }

                        const waitTime = page === totalPages ? 2000 : 1000;
                        await new Promise(resolve => setTimeout(resolve, waitTime));

                    } catch (error) {
                        console.error(`❌ 第${page}页播放过程出错:`, error);
                        await new Promise(resolve => setTimeout(resolve, 2000));
                    }
                }

                if (isAutoPlaying) {
                    await new Promise(resolve => setTimeout(resolve, 3000));
                    stopAutoPlay();
                }

            } catch (error) {
                console.error('❌ 自动播放失败:', error);
                updateStatus('自动播放失败: ' + error.message, 'error');
                stopAutoPlay();
            }
        };

        function stopAutoPlay() {
            if (isAutoPlaying) {
                isAutoPlaying = false;
                document.body.classList.remove('recording-mode');

                const autoPlayBtn = document.getElementById('autoPlayBtn');
                autoPlayBtn.textContent = '🎬 自动播放';
                autoPlayBtn.style.background = 'linear-gradient(135deg, #2196f3, #1976d2)';

                console.log('⏹️ 自动播放已停止');
                updateStatus('自动播放已停止', 'normal');
            }
        }

        // 开始教学功能 - 暴露到全局作用域
        window.startTeaching = startTeaching;

        // 页面关闭清理
        window.addEventListener('beforeunload', function() {
            if (isAutoPlaying) {
                stopAutoPlay();
            }
            
            if (avatarPlatform && isConnected) {
                avatarPlatform.stop();
            }
        });
    </script>
